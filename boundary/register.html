<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Register | Fundraising System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-body">
  <div class="auth-wrapper">

    <div class="auth-left">
      <h1>Create Your Account</h1>
      <p>
        Join the fundraising platform by selecting an active user profile created by the user admin.
      </p>
    </div>

    <div class="auth-card">
      <h2>Register</h2>
      <p class="auth-subtitle">Create an account to get started</p>

      <p id="flashMessage" class="flash"></p>

      <form id="registerForm">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>

        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <label>User Profile</label>
        <select id="role" required>
          <option value="">Loading profiles...</option>
        </select>

        <button type="submit" class="auth-btn">Register</button>
      </form>

      <p class="auth-link-text">
        Already have an account?
        <a href="login.html">Login</a>
      </p>
    </div>

  </div>

  <script>
    const form = document.getElementById('registerForm');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flashMessage');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3500);
    }

    async function loadProfiles() {
      try {
        const response = await fetch('/api/profiles/active');
        const profiles = await response.json();

        const select = document.getElementById('role');
        select.innerHTML = '<option value="">Select user profile</option>';

        if (!Array.isArray(profiles) || profiles.length === 0) {
          select.innerHTML = '<option value="">No active profiles available</option>';
          return;
        }

        profiles.forEach(profile => {
          const option = document.createElement('option');
          option.value = profile.role;
          option.textContent = profile.profile_name;
          select.appendChild(option);
        });

      } catch (error) {
        showMessage('Unable to load user profiles.', 'error');
      }
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const userData = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };

      if (!userData.role) {
        showMessage('Please select a user profile.', 'error');
        return;
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(userData)
        });

        const data = await response.json();

        if (response.ok) {
          alert('Account registered successfully.');
          form.reset();

          setTimeout(() => {
            window.location.href = 'login.html';
          }, 800);
        } else {
          showMessage(data.error || 'Registration failed.', 'error');
        }

      } catch (error) {
        showMessage('Cannot connect to server. Please make sure server.js is running.', 'error');
      }
    });

    loadProfiles();
  </script>
</body>
</html>

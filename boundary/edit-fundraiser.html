<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Fundraiser</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body fundraisers-fundraiser">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>Edit Fundraiser</h1>
        <p>Update fundraiser campaign details.</p>
      </div>

      <a href="my-fundraisers.html" class="create-fundraiser-back-btn">
        Back
      </a>
    </div>

    <div class="fundraisers-filter-card">
      <h2>Fundraiser Details</h2>

      <p id="flash-message" class="flash"></p>

      <form id="editFundraiserForm">
        <label>Fundraiser Title</label>
        <input type="text" id="title" placeholder="Enter fundraiser title">

        <label>Description</label>
        <textarea id="description" placeholder="Enter fundraiser description"></textarea>

        <label>Target Amount</label>
        <input type="number" id="target_amount" placeholder="Enter target amount" min="1">

        <label>Category</label>
        <select id="category_id">
          <option value="">Select Category</option>
        </select>

        <div class="fundraisers-actions">
          <button type="submit" class="fundraisers-edit-btn">
            Update Fundraiser
          </button>

          <button type="button" class="fundraisers-clear-btn" onclick="window.location.href='my-fundraisers.html'">
            Cancel
          </button>
        </div>
      </form>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fundraiserId = params.get('id');

    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
      window.location.href = 'login.html';
    }

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flash-message');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function loadCategories(selectedCategoryId) {
      const res = await fetch('/api/categories');
      const categories = await res.json();

      const categorySelect = document.getElementById('category_id');
      categorySelect.innerHTML = '<option value="">Select Category</option>';

      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category.id;
        option.textContent = category.name;

        if (String(category.id) === String(selectedCategoryId)) {
          option.selected = true;
        }

        categorySelect.appendChild(option);
      });
    }

    async function loadFundraiser() {
      if (!fundraiserId) {
        showMessage('Fundraiser ID is missing.', 'error');
        return;
      }

      const res = await fetch(`/api/fundraisers/${fundraiserId}`, {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showMessage(data.error || 'Unable to load fundraiser.', 'error');
        return;
      }

      if (String(data.status).toLowerCase() === 'completed') {
        alert('Completed fundraising activities cannot be edited.');
        window.location.href = 'my-fundraisers.html';
        return;
      }

      document.getElementById('title').value = data.title || '';
      document.getElementById('description').value = data.description || '';
      document.getElementById('target_amount').value = data.target_amount || '';

      await loadCategories(data.category_id);
    }

    document.getElementById('editFundraiserForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const target_amount = Number(document.getElementById('target_amount').value);
      const category_id = document.getElementById('category_id').value;

      if (!title) {
        showMessage('Fundraiser title is required.', 'error');
        return;
      }

      if (!description) {
        showMessage('Description is required.', 'error');
        return;
      }

      if (!target_amount || target_amount <= 0) {
        showMessage('Target amount must be more than 0.', 'error');
        return;
      }

      if (!category_id) {
        showMessage('Category is required.', 'error');
        return;
      }

      const res = await fetch(`/api/fundraisers/${fundraiserId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          title,
          description,
          target_amount,
          category_id
        })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showMessage(data.error || 'Unable to update fundraiser.', 'error');
        return;
      }

      alert('Fundraiser updated successfully.');
      window.location.href = 'my-fundraisers.html';
    });

    loadFundraiser();
  </script>
</body>
</html>

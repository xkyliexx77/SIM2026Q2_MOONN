<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completed Fundraisers</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="completed-body">
  <div class="completed-container">

    <div class="completed-header">
      <div>
        <h1>Completed Fundraisers</h1>
        <p>View and filter your completed fundraising campaigns.</p>
      </div>

      <a href="dashboard.html" class="completed-back-btn">Back to Dashboard</a>
    </div>

    <div class="completed-filter-card">
      <h2>Filter Fundraisers</h2>

      <div class="completed-filters">
        <div>
          <label>Category</label>
          <select id="categoryFilter"></select>
        </div>

        <div>
          <label>From</label>
          <input type="date" id="dateFrom">
        </div>

        <div>
          <label>To</label>
          <input type="date" id="dateTo">
        </div>

        <button class="completed-filter-btn" onclick="loadCompleted()">Filter</button>
      </div>
    </div>

    <div id="completed-list" class="completed-list"></div>

  </div>

  <script>
    const list = document.getElementById('completed-list');

    async function loadCategories() {
      const res = await fetch('/api/categories');
      const categories = await res.json();

      const select = document.getElementById('categoryFilter');
      select.innerHTML = '<option value="">All Categories</option>';

      categories.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.name;
        select.appendChild(option);
      });
    }

    async function loadCompleted() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const category = document.getElementById('categoryFilter').value;
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;

      const query = new URLSearchParams({
        category,
        dateFrom,
        dateTo
      });

      const res = await fetch(`/api/fundraisers/mine/completed?${query.toString()}`, {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();
      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = `
          <div class="completed-empty-card">
            <p>No completed fundraisers found.</p>
          </div>
        `;
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'completed-item-card';

        div.innerHTML = `
          <div class="completed-item-header">
            <h3>${item.title}</h3>
            <span>${item.status}</span>
          </div>

          <p class="completed-description">${item.description || 'No description provided.'}</p>

          <div class="completed-info-grid">
            <p><strong>Category:</strong> ${item.category_name || 'No Category'}</p>
            <p><strong>Target:</strong> $${item.target_amount}</p>
            <p><strong>Raised:</strong> $${item.current_amount}</p>
            <p><strong>Created At:</strong> ${item.created_at}</p>
          </div>
        `;

        list.appendChild(div);
      });
    }

    async function init() {
      await loadCategories();
      await loadCompleted();
    }

    init();
  </script>
</body>
</html>

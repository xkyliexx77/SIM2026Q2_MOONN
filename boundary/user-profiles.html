<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Profiles</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>User Profile Management</h1>
        <p>Search, update and suspend user profiles.</p>
      </div>

      <div style="display:flex; gap:12px;">
        <a href="create-user-profile.html" class="admin-btn">
          Create Profile
        </a>

        <a href="dashboard.html" class="fundraisers-back-btn">
          Back to Dashboard
        </a>
      </div>
    </div>

    <div class="fundraisers-filter-card">
      <h2>Search User Profiles</h2>

      <p id="profile-flash" class="flash"></p>

      <div class="fundraisers-filters">
        <div>
          <label>Search</label>
          <input
            type="text"
            id="search-input"
            placeholder="Search profile name or description">
        </div>

        <button
          class="admin-btn"
          onclick="loadProfiles()">
          Search
        </button>

        <button
          class="fundraisers-clear-btn"
          onclick="clearSearch()">
          Clear
        </button>
      </div>
    </div>

    <div id="profile-list" class="fundraisers-list"></div>

  </div>

  <script>

    const list = document.getElementById('profile-list');

    const token = localStorage.getItem('token');

    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
      window.location.href = 'login.html';
    }

    if (user && user.role !== 'admin') {
      alert('Only user admin can manage user profiles.');
      window.location.href = 'dashboard.html';
    }

    function showMessage(text, type = 'success') {

      const msg = document.getElementById('profile-flash');

      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);

    }

    function escapeText(value) {

      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');

    }

    function clearSearch() {

      document.getElementById('search-input').value = '';
      loadProfiles();

    }

    async function loadProfiles() {

      const search =
        document.getElementById('search-input').value.trim();

      const query = new URLSearchParams();

      if (search) {
        query.append('search', search);
      }

      const url = search
        ? `/api/profiles/search?${query.toString()}`
        : '/api/profiles';

      const res = await fetch(url, {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      list.innerHTML = '';

      if (!Array.isArray(data) || data.length === 0) {

        list.innerHTML = `
          <div class="fundraisers-empty-card">
            <p>No user profiles found.</p>
          </div>
        `;

        return;
      }

      data.forEach(profile => {

        const div = document.createElement('div');

        div.className = 'fundraisers-item-card';

        div.innerHTML = `
          <div class="fundraisers-item-top">

            <div>
              <h3>${escapeText(profile.profile_name)}</h3>
              <p>Profile ID: ${profile.id}</p>
            </div>

            <span class="fundraisers-category-badge">
              ${escapeText(profile.status || 'active')}
            </span>

          </div>

          <div class="fundraisers-info-grid">

            <div>
              <span>Description</span>
              <strong>
                ${escapeText(profile.profile_description || 'No description')}
              </strong>
            </div>

            <div>
              <span>Status</span>
              <strong>
                ${escapeText(profile.status || 'active')}
              </strong>
            </div>

          </div>

          <div class="fundraisers-actions">

            <button
              class="fundraisers-view-btn"
              onclick="window.location.href='edit-profile.html?id=${profile.id}'">
              Edit
            </button>

            <button
              class="fundraisers-fav-btn"
              onclick="suspendProfile(${profile.id})">
              Suspend
            </button>

          </div>
        `;

        list.appendChild(div);

      });

    }

    async function suspendProfile(id) {

      if (!confirm('Are you sure you want to suspend this user profile?')) {
        return;
      }

      const res = await fetch(`/api/profiles/${id}/suspend`, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      if (!res.ok || data.error) {

        showMessage(
          data.error || 'Failed to suspend profile.',
          'error'
        );

        return;
      }

      alert('User profile suspended successfully.');

      loadProfiles();

    }

    loadProfiles();

  </script>
</body>
</html>

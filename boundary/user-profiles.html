<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Profile Management</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="fundraisers-body fundraisers-admin">

  <div class="fundraisers-container">

    <div class="fundraisers-header">

      <div>
        <h1>User Profile Management</h1>
        <p>Manage all user profiles.</p>
      </div>

      <div style="display:flex; gap:12px;">

        <a
          href="create-user-profile.html"
          class="admin-btn">
          Create Profile
        </a>

        <a
          href="dashboard.html"
          class="fundraisers-back-btn">
          Back
        </a>

      </div>

    </div>

    <div class="fundraisers-filter-card">

      <h2>Search Profiles</h2>

      <div class="fundraisers-filter-grid">

        <div>
          <label>Search</label>

          <input
            type="text"
            id="searchInput"
            placeholder="Search profile name or description">
        </div>

      </div>

      <div class="fundraisers-actions">

        <button
          class="admin-btn"
          onclick="searchProfiles()">
          Search
        </button>

        <button
          class="fundraisers-clear-btn"
          onclick="clearSearch()">
          Clear
        </button>

      </div>

    </div>

    <div
      class="fundraisers-grid"
      id="profilesGrid">
    </div>

  </div>

  <script>

    const token =
      localStorage.getItem('token');

    if (!token) {

      window.location.href =
        'login.html';

    }

    window.allProfiles = [];

    async function loadProfiles() {

      try {

        const response =
          await fetch('/api/profiles', {

            headers: {
              Authorization:
                'Bearer ' + token
            }

          });

        const profiles =
          await response.json();

        window.allProfiles = profiles;

        renderProfiles(profiles);

      } catch (error) {

        document.getElementById(
          'profilesGrid'
        ).innerHTML = `
          <div class="fundraisers-empty-card">
            <p>Unable to load profiles.</p>
          </div>
        `;

      }

    }

    function renderProfiles(profiles) {

      const grid =
        document.getElementById(
          'profilesGrid'
        );

      if (
        !Array.isArray(profiles) ||
        profiles.length === 0
      ) {

        grid.innerHTML = `
          <div class="fundraisers-empty-card">
            <p>No profiles found.</p>
          </div>
        `;

        return;

      }

      grid.innerHTML = profiles.map(profile => `

        <div class="fundraisers-item-card">

          <div class="fundraisers-item-top">

            <div>

              <h3>
                ${profile.profile_name}
              </h3>

              <p>
                ${profile.description || profile.profile_description || 'No description'}
              </p>

            </div>

            <span class="fundraisers-category-badge">
              ${profile.status || 'active'}
            </span>

          </div>

          <div class="fundraisers-info-grid">

            <div>
              <span>Profile ID</span>

              <strong>
                ${profile.id}
              </strong>
            </div>

            <div>
              <span>Status</span>

              <strong>
                ${profile.status || 'active'}
              </strong>
            </div>

          </div>

          <div class="fundraisers-actions">

            <button
              class="fundraisers-view-btn"
              onclick="window.location.href='user-profile-detail.html?id=${profile.id}'">
              View Details
            </button>

            <button
              class="fundraisers-edit-btn"
              onclick="window.location.href='edit-profile.html?id=${profile.id}'">
              Edit
            </button>

            <button
              class="fundraisers-delete-btn"
              onclick="suspendProfile(${profile.id})">
              Suspend
            </button>

          </div>

        </div>

      `).join('');

    }

    function searchProfiles() {

      const keyword =
        document.getElementById(
          'searchInput'
        )
        .value
        .toLowerCase();

      const filtered =
        window.allProfiles.filter(profile =>

          String(profile.profile_name || '')
            .toLowerCase()
            .includes(keyword)

          ||

          String(profile.description || profile.profile_description || '')
            .toLowerCase()
            .includes(keyword)

        );

      renderProfiles(filtered);

    }

    function clearSearch() {

      document.getElementById(
        'searchInput'
      ).value = '';

      renderProfiles(window.allProfiles);

    }

    async function suspendProfile(id) {

      if (
        !confirm(
          'Suspend this user profile?'
        )
      ) return;

      try {

        const response =
          await fetch(`/api/profiles/${id}/suspend`, {

            method: 'PUT',

            headers: {
              Authorization:
                'Bearer ' + token
            }

          });

        const data =
          await response.json();

        if (!response.ok || data.error) {

          alert(
            data.error ||
            'Unable to suspend profile.'
          );

          return;

        }

        alert(
          'Profile suspended successfully.'
        );

        loadProfiles();

      } catch (error) {

        alert(
          'Something went wrong.'
        );

      }

    }

    loadProfiles();

  </script>

</body>
</html>

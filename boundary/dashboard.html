<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body id="dashboard-page-body" class="dashboard-page-body">

  <div class="dashboard-main-container">

    <div id="dashboard-role-banner" class="dashboard-role-banner">

      <div>
        <p id="dashboard-role-label" class="dashboard-role-label"></p>

        <h1 id="dashboard-title">
          Dashboard
        </h1>

        <p id="dashboard-welcome"></p>
      </div>

      <button
        class="dashboard-logout-btn"
        onclick="logout()">
        Logout
      </button>

    </div>

    <div class="dashboard-content-grid">

      <div class="dashboard-profile-panel">

        <h2>My Profile</h2>

        <div
          class="dashboard-avatar"
          id="dashboard-initial">
          U
        </div>

        <p>
          <strong>Name:</strong>
          <span id="dashboard-name"></span>
        </p>

        <p>
          <strong>Email:</strong>
          <span id="dashboard-email"></span>
        </p>

        <p>
          <strong>Role:</strong>
          <span id="dashboard-role"></span>
        </p>

      </div>

      <div class="dashboard-action-panel">

        <h2 id="dashboard-action-title">
          Quick Actions
        </h2>

        <p
          id="dashboard-action-subtitle"
          class="dashboard-subtext">
        </p>

        <div
          id="dashboard-menu"
          class="dashboard-menu">
        </div>

      </div>

    </div>

  </div>

  <script>

    const user =
      JSON.parse(localStorage.getItem('user'));

    if (!user) {

      window.location.href = 'login.html';

    }

    else {

      const role =
        String(user.role || '')
          .toLowerCase()
          .trim();

      document.body.classList.add(
        `dashboard-${role}`
      );

      document.getElementById('dashboard-welcome')
        .textContent =
          `Welcome back, ${user.name}`;

      document.getElementById('dashboard-name')
        .textContent =
          user.name || '-';

      document.getElementById('dashboard-email')
        .textContent =
          user.email || '-';

      document.getElementById('dashboard-role')
        .textContent =
          user.role || '-';

      document.getElementById('dashboard-initial')
        .textContent =
          user.name
            ? user.name.charAt(0).toUpperCase()
            : 'U';

      const menu =
        document.getElementById('dashboard-menu');

      /*
        ADMIN DASHBOARD
      */

      if (role.includes('admin')) {

        document.getElementById(
          'dashboard-role-label'
        ).textContent =
          'User Admin Workspace';

        document.getElementById(
          'dashboard-title'
        ).textContent =
          'User Admin Dashboard';

        document.getElementById(
          'dashboard-action-subtitle'
        ).textContent =
          'Manage user profiles and user accounts.';

        menu.innerHTML = `

          <a
            class="dashboard-action-card"
            href="user-profiles.html">

            <span>
              Manage User Profiles
            </span>

            <small>
              Create, view, update,
              suspend and search user profiles
            </small>

          </a>

          <a
            class="dashboard-action-card"
            href="admin-users.html">

            <span>
              Manage User Accounts
            </span>

            <small>
              View, update, suspend,
              activate and search user accounts
            </small>

          </a>

        `;

      }

      /*
        MANAGER DASHBOARD
      */

      else if (role.includes('manager')) {

        document.getElementById(
          'dashboard-role-label'
        ).textContent =
          'Manager Workspace';

        document.getElementById(
          'dashboard-title'
        ).textContent =
          'Management Dashboard';

        document.getElementById(
          'dashboard-action-subtitle'
        ).textContent =
          'Manage platform categories and generate reports.';

        menu.innerHTML = `

          <a
            class="dashboard-action-card"
            href="categories.html">

            <span>
              Category Control
            </span>

            <small>
              Create, edit and delete categories
            </small>

          </a>

          <a
            class="dashboard-action-card"
            href="reports.html">

            <span>
              Reports & Analytics
            </span>

            <small>
              View daily, weekly and monthly reports
            </small>

          </a>

        `;

      }

      /*
        FUNDRAISER DASHBOARD
      */

      else if (role.includes('fundraiser')) {

        document.getElementById(
          'dashboard-role-label'
        ).textContent =
          'Fundraiser Workspace';

        document.getElementById(
          'dashboard-title'
        ).textContent =
          'Fundraiser Dashboard';

        document.getElementById(
          'dashboard-action-subtitle'
        ).textContent =
          'Create, update, delete and manage only your own fundraising activities.';

        menu.innerHTML = `

          <a
            class="dashboard-action-card"
            href="create-fundraiser.html">

            <span>
              Create Fundraiser
            </span>

            <small>
              Start a new fundraising activity
            </small>

          </a>

          <a
            class="dashboard-action-card"
            href="my-fundraisers.html">

            <span>
              My Fundraisers
            </span>

            <small>
              CRUD and track only your own activities
            </small>

          </a>

        `;

      }

      /*
        DONEE DASHBOARD
      */

      else if (role.includes('donee')) {

        document.getElementById(
          'dashboard-role-label'
        ).textContent =
          'Donee Workspace';

        document.getElementById(
          'dashboard-title'
        ).textContent =
          'Donation Dashboard';

        document.getElementById(
          'dashboard-action-subtitle'
        ).textContent =
          'Browse, favourite and donate to campaigns.';

        menu.innerHTML = `

          <a
            class="dashboard-action-card"
            href="fundraisers.html">

            <span>
              Browse Fundraisers
            </span>

            <small>
              Find campaigns to support
            </small>

          </a>

          <a
            class="dashboard-action-card"
            href="favourites.html">

            <span>
              My Favourites
            </span>

            <small>
              View saved campaigns
            </small>

          </a>

          <a
            class="dashboard-action-card"
            href="donations.html">

            <span>
              My Donations
            </span>

            <small>
              Track your donation transaction history
            </small>

          </a>

          <a
            class="dashboard-action-card"
            href="completed-donation-history.html">

            <span>
              Completed Activity History
            </span>

            <small>
              View completed fundraising activities
              you donated to
            </small>

          </a>

        `;

      }

      /*
        UNKNOWN ROLE
      */

      else {

        document.getElementById(
          'dashboard-role-label'
        ).textContent =
          'User Workspace';

        document.getElementById(
          'dashboard-title'
        ).textContent =
          'Dashboard';

        document.getElementById(
          'dashboard-action-subtitle'
        ).textContent =
          'No dashboard available for this role.';

      }

    }

    function logout() {

      localStorage.removeItem('token');

      localStorage.removeItem('user');

      window.location.href =
        'login.html';

    }

  </script>

</body>
</html>

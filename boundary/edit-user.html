<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit User Account</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">

  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>Edit User Account</h1>
        <p>Update user account details and role.</p>
      </div>

      <a href="admin-users.html" class="fundraisers-back-btn">
        Back to User Management
      </a>
    </div>

    <div class="fundraisers-filter-card">

      <h2>User Details</h2>

      <p id="flash-message" class="flash"></p>

      <div style="display:flex; flex-direction:column; gap:28px; margin-top:28px;">

        <div>
          <label>Name</label>

          <input
            type="text"
            id="edit-name"
            placeholder="Enter name">
        </div>

        <div>
          <label>Email</label>

          <input
            type="email"
            id="edit-email"
            placeholder="Enter email">
        </div>

        <div>
          <label>Role</label>

          <select id="edit-role">
            <option value="">Select Profile Role</option>
          </select>
        </div>

      </div>

      <div
        style="
          display:flex;
          gap:16px;
          margin-top:28px;
        ">

        <button
          class="admin-btn"
          onclick="updateUser()">
          Update User
        </button>

        <button
          class="fundraisers-clear-btn"
          onclick="window.location.href='admin-users.html'">
          Cancel
        </button>

      </div>

    </div>

  </div>

  <script>

    const token = localStorage.getItem('token');

    const loginUser =
      JSON.parse(localStorage.getItem('user'));

    const params =
      new URLSearchParams(window.location.search);

    const userId = params.get('id');

    let currentUser = null;

    if (!token || !loginUser) {
      window.location.href = 'login.html';
    }

    if (loginUser && loginUser.role !== 'admin') {

      alert('Only user admin can access this page.');

      window.location.href = 'dashboard.html';

    }

    if (!userId) {

      alert('User ID is missing.');

      window.location.href = 'admin-users.html';

    }

    function showMessage(text, type = 'success') {

      const msg =
        document.getElementById('flash-message');

      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);

    }

    async function loadProfileRoles(selectedRole) {

      const roleSelect =
        document.getElementById('edit-role');

      roleSelect.innerHTML =
        '<option value="">Select Profile Role</option>';

      const res = await fetch('/api/profiles', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const profiles = await res.json();

      if (!res.ok || !Array.isArray(profiles)) {

        showMessage(
          'Unable to load profile roles.',
          'error'
        );

        return;
      }

      profiles
        .filter(profile => profile.status === 'active')
        .forEach(profile => {

          const option =
            document.createElement('option');

          option.value = profile.profile_name;

          option.textContent =
            profile.profile_name;

          if (
            profile.profile_name === selectedRole
          ) {
            option.selected = true;
          }

          roleSelect.appendChild(option);

        });

    }

    async function loadUser() {

      const res = await fetch('/api/users', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const users = await res.json();

      if (!res.ok || !Array.isArray(users)) {

        showMessage(
          'Unable to load user details.',
          'error'
        );

        return;
      }

      currentUser =
        users.find(
          u => String(u.id) === String(userId)
        );

      if (!currentUser) {

        alert('User not found.');

        window.location.href = 'admin-users.html';

        return;
      }

      document.getElementById('edit-name').value =
        currentUser.name || '';

      document.getElementById('edit-email').value =
        currentUser.email || '';

      await loadProfileRoles(currentUser.role);

    }

    async function updateUser() {

      const name =
        document.getElementById('edit-name')
          .value
          .trim();

      const email =
        document.getElementById('edit-email')
          .value
          .trim();

      const role =
        document.getElementById('edit-role')
          .value;

      if (!name) {

        showMessage(
          'Name is required.',
          'error'
        );

        return;
      }

      if (!email) {

        showMessage(
          'Email is required.',
          'error'
        );

        return;
      }

      if (!role) {

        showMessage(
          'Profile role is required.',
          'error'
        );

        return;
      }

      const res = await fetch(`/api/users/${userId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          name,
          email,
          role
        })
      });

      const data = await res.json();

      if (!res.ok || data.error) {

        showMessage(
          data.error || 'Unable to update user account.',
          'error'
        );

        return;
      }

      alert('User account updated successfully.');

      window.location.href = 'admin-users.html';

    }

    loadUser();

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit User Account</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>Edit User Account</h1>
        <p>Update user account details and role.</p>
      </div>

      <a href="admin-users.html" class="fundraisers-back-btn">Back to User Management</a>
    </div>

    <div class="fundraisers-filter-card">
      <h2>User Details</h2>
      <p id="edit-user-flash" class="flash"></p>

      <form id="edit-user-form">
        <label>Name</label>
        <input type="text" id="edit-name" required>

        <label>Email</label>
        <input type="email" id="edit-email" required>

        <label>Role</label>
        <select id="edit-role" required>
          <option value="admin">User Admin</option>
          <option value="fundraiser">Fundraiser</option>
          <option value="donee">Donee</option>
          <option value="manager">Platform Manager</option>
        </select>

        <button type="submit" class="fundraisers-search-btn">Update User</button>
        <button type="button" class="fundraisers-clear-btn" onclick="goBack()">Cancel</button>
      </form>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('edit-user-flash');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    function getToken() {
      return localStorage.getItem('token');
    }

    async function loadUser() {
      const token = getToken();

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const res = await fetch('/api/users', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const users = await res.json();
      const user = users.find(u => String(u.id) === String(userId));

      if (!user) {
        showMessage('User not found.', 'error');
        return;
      }

      document.getElementById('edit-name').value = user.name;
      document.getElementById('edit-email').value = user.email;
      document.getElementById('edit-role').value = user.role;
    }

    document.getElementById('edit-user-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const token = getToken();

      const body = {
        name: document.getElementById('edit-name').value,
        email: document.getElementById('edit-email').value,
        role: document.getElementById('edit-role').value
      };

      const res = await fetch(`/api/users/${userId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (res.ok) {
        showMessage('User updated successfully.', 'success');

        setTimeout(() => {
          window.location.href = 'admin-users.html';
        }, 1000);
      } else {
        showMessage(data.error || 'Failed to update user.', 'error');
      }
    });

    function goBack() {
      window.location.href = 'admin-users.html';
    }

    loadUser();
  </script>
</body>
</html>

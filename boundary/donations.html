<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Donations</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="donation-body">
  <div class="donation-container">

    <div class="donation-header">
      <div>
        <h1>My Donation History</h1>
        <p>Track and review your donation transactions.</p>
      </div>

      <a href="dashboard.html" class="donation-back-btn">
        Back to Dashboard
      </a>
    </div>

    <div class="donation-filter-card">
      <h2>Search Donation History</h2>

      <div class="donation-filters">

        <div>
          <label>Category</label>
          <select id="category-filter"></select>
        </div>

        <div>
          <label>From Date</label>
          <input type="date" id="date-from">
        </div>

        <div>
          <label>To Date</label>
          <input type="date" id="date-to">
        </div>

        <button class="donation-filter-btn" onclick="loadDonations()">
          Search
        </button>

        <button class="donation-clear-btn" onclick="clearFilters()">
          Clear
        </button>

      </div>
    </div>

    <div id="donation-list" class="donation-list"></div>

  </div>

  <script>

    const list =
      document.getElementById('donation-list');

    const user =
      JSON.parse(localStorage.getItem('user'));

    const token =
      localStorage.getItem('token');

    if (!user || !token) {

      window.location.href = 'login.html';

    }

    /*
    |--------------------------------------------------------------------------
    | FIXED ROLE CHECK
    |--------------------------------------------------------------------------
    */

    const userRole =
      String(user.role || '')
        .toLowerCase()
        .trim();

    if (!userRole.includes('donee')) {

      alert(
        'Only doneees can access donation history.'
      );

      window.location.href =
        'dashboard.html';

    }



    async function loadCategories() {

      const res =
        await fetch('/api/categories');

      const categories =
        await res.json();

      const select =
        document.getElementById(
          'category-filter'
        );

      select.innerHTML = `
        <option value="">
          All Categories
        </option>
      `;

      categories.forEach(c => {

        const option =
          document.createElement('option');

        option.value =
          c.id;

        option.textContent =
          c.name;

        select.appendChild(option);

      });

    }



    function clearFilters() {

      document.getElementById(
        'category-filter'
      ).value = '';

      document.getElementById(
        'date-from'
      ).value = '';

      document.getElementById(
        'date-to'
      ).value = '';

      loadDonations();

    }



    async function loadDonations() {

      const category =
        document.getElementById(
          'category-filter'
        ).value;

      const dateFrom =
        document.getElementById(
          'date-from'
        ).value;

      const dateTo =
        document.getElementById(
          'date-to'
        ).value;

      const query =
        new URLSearchParams();

      if (category) {
        query.append(
          'category',
          category
        );
      }

      if (dateFrom) {
        query.append(
          'dateFrom',
          dateFrom
        );
      }

      if (dateTo) {
        query.append(
          'dateTo',
          dateTo
        );
      }

      const res =
        await fetch(
          `/api/donations/mine?${query.toString()}`,
          {
            headers: {
              'Authorization':
                'Bearer ' + token
            }
          }
        );

      const data =
        await res.json();

      list.innerHTML = '';

      if (
        !Array.isArray(data) ||
        !data.length
      ) {

        list.innerHTML = `
          <div class="donation-empty-card">

            <h3>
              No donations found
            </h3>

            <p>
              You have not made any donations
              for the selected filter.
            </p>

          </div>
        `;

        return;

      }

      data.forEach(item => {

        const progress =
          item.target_amount > 0
            ? Math.min(
                (
                  item.current_amount /
                  item.target_amount
                ) * 100,
                100
              ).toFixed(1)
            : 0;

        const div =
          document.createElement('div');

        div.className =
          'donation-item-card';

        div.innerHTML = `

          <div class="donation-item-top">

            <div>

              <h3>
                ${item.title}
              </h3>

              <p>
                ${item.category_name || 'No Category'}
              </p>

            </div>

            <span class="donation-amount">
              $${item.amount}
            </span>

          </div>

          <div class="donation-info-row">

            <span>
              Donation Date
            </span>

            <strong>
              ${item.donated_at}
            </strong>

          </div>

          <div class="donation-info-row">

            <span>
              Campaign Status
            </span>

            <strong>
              ${item.status}
            </strong>

          </div>

          <div class="donation-info-row">

            <span>
              Campaign Progress
            </span>

            <strong>
              $${item.current_amount}
              /
              $${item.target_amount}
              (${progress}%)
            </strong>

          </div>

          <button
            class="donation-browse-btn"
            onclick="
              window.location.href=
              'fundraiser-detail.html?id=${item.fundraiser_id}'
            "
          >
            View Campaign Details
          </button>

        `;

        list.appendChild(div);

      });

    }



    async function init() {

      await loadCategories();

      await loadDonations();

    }

    init();

  </script>
</body>
</html>

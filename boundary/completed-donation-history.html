<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Completed Fundraising History</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="donation-body">
  <div class="donation-container">

    <div class="donation-header">
      <div>
        <h1>Completed Fundraising History</h1>
        <p>View completed fundraising activities you have donated to.</p>
      </div>

      <a href="dashboard.html" class="donation-back-btn">Back to Dashboard</a>
    </div>

    <div class="donation-filter-card">
      <h2>Search Completed Activities</h2>

      <div class="donation-filters">
        <div>
          <label>Category</label>
          <select id="completed-category-filter"></select>
        </div>

        <div>
          <label>From Donation Date</label>
          <input type="date" id="completed-date-from">
        </div>

        <div>
          <label>To Donation Date</label>
          <input type="date" id="completed-date-to">
        </div>

        <button class="donation-filter-btn" onclick="loadCompletedHistory()">Search</button>
        <button class="donation-clear-btn" onclick="clearCompletedFilters()">Clear</button>
      </div>
    </div>

    <div id="completed-list" class="donation-list"></div>

  </div>

  <script>
    const list = document.getElementById('completed-list');

    const user = JSON.parse(localStorage.getItem('user'));
    const token = localStorage.getItem('token');

    if (!user || !token) {
      window.location.href = 'login.html';
    }

    if (user && user.role !== 'donee') {
      alert('Only donees can view completed fundraising history.');
      window.location.href = 'dashboard.html';
    }

    async function loadCategories() {
      const res = await fetch('/api/categories');
      const categories = await res.json();

      const select = document.getElementById('completed-category-filter');
      select.innerHTML = '<option value="">All Categories</option>';

      categories.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.name;
        select.appendChild(option);
      });
    }

    function clearCompletedFilters() {
      document.getElementById('completed-category-filter').value = '';
      document.getElementById('completed-date-from').value = '';
      document.getElementById('completed-date-to').value = '';
      loadCompletedHistory();
    }

    async function loadCompletedHistory() {
      const category = document.getElementById('completed-category-filter').value;
      const dateFrom = document.getElementById('completed-date-from').value;
      const dateTo = document.getElementById('completed-date-to').value;

      const query = new URLSearchParams();

      if (category) query.append('category', category);
      if (dateFrom) query.append('dateFrom', dateFrom);
      if (dateTo) query.append('dateTo', dateTo);

      const res = await fetch(`/api/donations/completed-history?${query.toString()}`, {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      list.innerHTML = '';

      if (!Array.isArray(data) || !data.length) {
        list.innerHTML = `
          <div class="donation-empty-card">
            <h3>No completed fundraising history found</h3>
            <p>You have not donated to any completed fundraising activities for the selected filter.</p>
          </div>
        `;
        return;
      }

      data.forEach(item => {
        const progress = item.target_amount > 0
          ? Math.min((item.current_amount / item.target_amount) * 100, 100).toFixed(1)
          : 0;

        const div = document.createElement('div');
        div.className = 'donation-item-card';

        div.innerHTML = `
          <div class="donation-item-top">
            <div>
              <h3>${item.title}</h3>
              <p>${item.category_name || 'No Category'}</p>
            </div>

            <span class="donation-amount">$${item.amount}</span>
          </div>

          <div class="donation-info-row">
            <span>Donation Date</span>
            <strong>${item.donated_at}</strong>
          </div>

          <div class="donation-info-row">
            <span>Campaign Status</span>
            <strong>${item.status}</strong>
          </div>

          <div class="donation-info-row">
            <span>Campaign Progress</span>
            <strong>$${item.current_amount} / $${item.target_amount} (${progress}%)</strong>
          </div>

          <button class="donation-browse-btn" onclick="window.location.href='fundraiser-detail.html?id=${item.fundraiser_id}'">
            View Campaign Details
          </button>
        `;

        list.appendChild(div);
      });
    }

    async function init() {
      await loadCategories();
      await loadCompletedHistory();
    }

    init();
  </script>
</body>
</html>

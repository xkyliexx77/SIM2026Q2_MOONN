<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Category</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>Create Category</h1>
        <p>Create a new fundraising category.</p>
      </div>

      <a href="categories.html" class="fundraisers-back-btn">
        Back to Category Management
      </a>
    </div>

    <div class="fundraisers-filter-card">
      <h2>Category Details</h2>
      <p id="flash-message" class="flash"></p>

      <div style="display:flex; flex-direction:column; gap:20px; margin-top:20px;">
        <div>
          <label>Name</label>
          <input type="text" id="category-name" placeholder="Enter category name">
        </div>
        <div>
          <label>Description</label>
          <input type="text" id="category-description" placeholder="Enter category description">
        </div>
      </div>
        
      <div style="display:flex; gap:16px; margin-top:28px;">
        <button class="admin-btn" onclick="createCategory()">
          Create Category
        </button>

        <button class="fundraisers-clear-btn" onclick="window.location.href='categories.html'">
          Cancel
        </button>
      </div>
    </div>

  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
      window.location.href = 'login.html';
    }

    if (user && !String(user.role || '').toLowerCase().includes('manager')) {
      alert('Only platform manager can access this page.');
      window.location.href = 'dashboard.html';
    }

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flash-message');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function createCategory() {
      const name = document.getElementById('category-name').value.trim();
      const description = document.getElementById('category-description').value.trim();

      if (!name) {
        showMessage('Category name is required.', 'error');
        return;
      }

      const res = await fetch('/api/categories', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          name,
          description
        })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showMessage(data.error || 'Unable to create category.', 'error');
        return;
      }

      alert('Category created successfully.');
      window.location.href = 'categories.html';
    }
  </script>
</body>
</html>

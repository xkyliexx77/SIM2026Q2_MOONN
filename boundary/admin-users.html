<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Admin - Manage Accounts</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>User Account Management</h1>
        <p>Search, update, suspend and activate user accounts.</p>
      </div>

      <div style="display:flex; gap:12px;">
        <a href="create-user-account.html" class="fundraisers-search-btn">Create User</a>
        <a href="dashboard.html" class="fundraisers-back-btn">Back to Dashboard</a>
      </div>
    </div>

    <div class="fundraisers-filter-card">
      <h2>Search Users</h2>
      <p id="admin-users-flash" class="flash"></p>

      <div class="fundraisers-filters">
        <div>
          <label>Search</label>
          <input type="text" id="search-input" placeholder="Search name, email or role">
        </div>

        <button class="fundraisers-search-btn" onclick="loadUsers()">Search</button>
        <button class="fundraisers-clear-btn" onclick="clearSearch()">Clear</button>
      </div>
    </div>

    <div id="users-list" class="fundraisers-list"></div>

  </div>

  <script>
    const list = document.getElementById('users-list');
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
      window.location.href = 'login.html';
    }

    if (user && user.role !== 'admin') {
      alert('Only user admin can access this page.');
      window.location.href = 'dashboard.html';
    }

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('admin-users-flash');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    function escapeText(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      loadUsers();
    }

    async function loadUsers() {
      const search = document.getElementById('search-input').value.trim();
      const query = new URLSearchParams();

      if (search) query.append('search', search);

      const url = search
        ? `/api/users/search?${query.toString()}`
        : '/api/users';

      const res = await fetch(url, {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      list.innerHTML = '';

      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = `
          <div class="fundraisers-empty-card">
            <p>No users found.</p>
          </div>
        `;
        return;
      }

      data.forEach(user => {
        const div = document.createElement('div');
        div.className = 'fundraisers-item-card';

        div.innerHTML = `
          <div class="fundraisers-item-top">
            <div>
              <h3>${escapeText(user.name)}</h3>
              <p>${escapeText(user.email)}</p>
            </div>

            <span class="fundraisers-category-badge">
              ${escapeText(user.role)}
            </span>
          </div>

          <div class="fundraisers-info-grid">
            <div>
              <span>User ID</span>
              <strong>${user.id}</strong>
            </div>

            <div>
              <span>Status</span>
              <strong>${escapeText(user.status || 'active')}</strong>
            </div>
          </div>

          <div class="fundraisers-actions">
            <button class="fundraisers-view-btn" onclick="window.location.href='edit-user.html?id=${user.id}'">
              Edit
            </button>

            ${
              user.status === 'suspended'
                ? `<button class="fundraisers-donate-btn" onclick="activateUser(${user.id})">Activate</button>`
                : `<button class="fundraisers-fav-btn" onclick="suspendUser(${user.id})">Suspend</button>`
            }
          </div>
        `;

        list.appendChild(div);
      });
    }

    async function suspendUser(id) {
      if (!confirm('Are you sure you want to suspend this user account?')) return;

      const res = await fetch(`/api/users/${id}/suspend`, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showMessage(data.error || 'Failed to suspend user.', 'error');
        return;
      }

      alert('User account suspended successfully.');
      loadUsers();
    }

    async function activateUser(id) {
      if (!confirm('Are you sure you want to activate this user account?')) return;

      const res = await fetch(`/api/users/${id}/activate`, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showMessage(data.error || 'Failed to activate user.', 'error');
        return;
      }

      alert('User account activated successfully.');
      loadUsers();
    }

    loadUsers();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Management</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="fundraisers-body fundraisers-admin">

  <div class="fundraisers-container">

    <div class="fundraisers-header">

      <div>
        <h1>User Management</h1>
        <p>Manage all user accounts and profiles.</p>
      </div>

      <div class="fundraisers-header-actions">

        <a
          href="create-user-account.html"
          class="admin-btn">
          Create User
        </a>
        
        <a
          href="dashboard.html"
          class="fundraisers-back-btn">
          Back
        </a>

      </div>

    </div>

    <div class="fundraisers-filter-card">

      <h2>Search Users</h2>

      <div class="fundraisers-filter-grid">

        <div>
          <label>Search</label>

          <input
            type="text"
            id="searchInput"
            placeholder="Search user name or email">
        </div>

      </div>

      <div class="fundraisers-actions">

        <button
          class="admin-btn"
          onclick="searchUsers()">
          Search
        </button>

        <button
          class="fundraisers-clear-btn"
          onclick="clearSearch()">
          Clear
        </button>

      </div>

    </div>

    <div
      class="fundraisers-grid"
      id="usersGrid">
    </div>

  </div>

  <script>

    const token =
      localStorage.getItem('token');

    if (!token) {

      window.location.href =
        'login.html';

    }

    window.allUsers = [];

    async function loadUsers() {

      try {

        const response =
          await fetch('/api/users', {

            headers: {
              Authorization:
                'Bearer ' + token
            }

          });

        const users =
          await response.json();

        window.allUsers = users;

        renderUsers(users);

      } catch (error) {

        console.error(error);

        document.getElementById(
          'usersGrid'
        ).innerHTML = `
          <div class="fundraisers-empty-card">
            <p>Unable to load users.</p>
          </div>
        `;

      }

    }

    function renderUsers(users) {

      const grid =
        document.getElementById(
          'usersGrid'
        );

      if (
        !Array.isArray(users) ||
        users.length === 0
      ) {

        grid.innerHTML = `
          <div class="fundraisers-empty-card">
            <p>No users found.</p>
          </div>
        `;

        return;

      }

      grid.innerHTML = users.map(user => `

        <div class="fundraisers-item-card">

          <div class="fundraisers-item-top">

            <div>

              <h3>
                ${user.name}
              </h3>

              <p>
                ${user.email}
              </p>

            </div>

            <span class="fundraisers-category-badge">
              ${user.role}
            </span>

          </div>

          <div class="fundraisers-info-grid">

            <div>
              <span>User ID</span>

              <strong>
                ${user.id}
              </strong>
            </div>

            <div>
              <span>Status</span>

              <strong>
                ${user.status || 'active'}
              </strong>
            </div>

          </div>

          <div class="fundraisers-actions">

            <button
              class="fundraisers-view-btn"
              onclick="window.location.href='user-account-detail.html?id=${user.id}'">
              View Details
            </button>

            <button
              class="fundraisers-edit-btn"
              onclick="window.location.href='edit-user.html?id=${user.id}'">
              Edit
            </button>

            <button
              class="fundraisers-delete-btn"
              onclick="suspendUser(${user.id})">
              Suspend
            </button>

          </div>

        </div>

      `).join('');

    }

    function searchUsers() {

      const keyword =
        document.getElementById(
          'searchInput'
        )
        .value
        .toLowerCase();

      const filtered =
        window.allUsers.filter(user =>

          String(user.name || '')
            .toLowerCase()
            .includes(keyword)

          ||

          String(user.email || '')
            .toLowerCase()
            .includes(keyword)

        );

      renderUsers(filtered);

    }

    function clearSearch() {

      document.getElementById(
        'searchInput'
      ).value = '';

      renderUsers(window.allUsers);

    }

    async function suspendUser(id) {

      const confirmSuspend =
        confirm(
          'Suspend this user account?'
        );

      if (!confirmSuspend) return;

      try {

        const response =
          await fetch(`/api/users/${id}/suspend`, {

            method: 'PUT',

            headers: {
              Authorization:
                'Bearer ' + token
            }

          });

        const data =
          await response.json();

        if (!response.ok || data.error) {

          alert(
            data.error ||
            'Unable to suspend user.'
          );

          return;

        }

        alert(
          'User suspended successfully.'
        );

        loadUsers();

      } catch (error) {

        console.error(error);

        alert(
          'Something went wrong.'
        );

      }

    }

    loadUsers();

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create User Profile</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>Create User Profile</h1>
        <p>Create profile name and description.</p>
      </div>

      <a href="user-profiles.html" class="fundraisers-back-btn">
        Back to Profile Management
      </a>
    </div>

    <div class="fundraisers-filter-card">
      <h2>Profile Details</h2>

      <p id="flash-message" class="flash"></p>

      <div style="display:flex; flex-direction:column; gap:28px; margin-top:28px;">
        <div>
          <label>Profile Name</label>
          <input type="text" id="profile-name" placeholder="Enter profile name">
        </div>

        <div>
          <label>Profile Description</label>
          <input type="text" id="profile-description" placeholder="Enter profile description">
        </div>
      </div>

      <div style="display:flex; gap:16px; margin-top:28px;">
        <button class="admin-btn" onclick="createProfile()">
          Create Profile
        </button>

        <button class="fundraisers-clear-btn" onclick="window.location.href='user-profiles.html'">
          Cancel
        </button>
      </div>
    </div>

  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user) {
      window.location.href = 'login.html';
    }

    if (user && user.role !== 'admin') {
      alert('Only user admin can access this page.');
      window.location.href = 'dashboard.html';
    }

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flash-message');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function createProfile() {
      const profile_name = document.getElementById('profile-name').value.trim();
      const profile_description = document.getElementById('profile-description').value.trim();

      if (!profile_name) {
        showMessage('Profile name is required.', 'error');
        return;
      }

      const res = await fetch('/api/profiles', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          profile_name,
          profile_description
        })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showMessage(data.error || 'Unable to create user profile.', 'error');
        return;
      }

      alert('User profile created successfully.');
      window.location.href = 'user-profiles.html';
    }
  </script>
</body>
</html>

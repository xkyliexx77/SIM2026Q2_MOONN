<!DOCTYPE html>
<html>
<head>
  <title>Completed Fundraisers</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Completed Fundraisers</h2>

      <div class="inline-filters">
        <div>
          <label>Category</label>
          <select id="categoryFilter"></select>
        </div>

        <div>
          <label>From</label>
          <input type="date" id="dateFrom">
        </div>

        <div>
          <label>To</label>
          <input type="date" id="dateTo">
        </div>

        <div>
          <button class="btn-primary" onclick="loadCompleted()">Filter</button>
        </div>
      </div>
    </div>

    <div id="list"></div>
  </div>

  <script>
    const list = document.getElementById('list');

    async function loadCategories() {
      const res = await fetch('/api/categories');
      const categories = await res.json();

      const select = document.getElementById('categoryFilter');
      select.innerHTML = '<option value="">All Categories</option>';

      categories.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.name;
        select.appendChild(option);
      });
    }

    async function loadCompleted() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      const category = document.getElementById('categoryFilter').value;
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;

      const query = new URLSearchParams({
        category,
        dateFrom,
        dateTo
      });

      const res = await fetch(`/api/fundraisers/mine/completed?${query.toString()}`, {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = '<div class="card"><p>No completed fundraisers found.</p></div>';
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
          <h3>${item.title}</h3>
          <p>${item.description || ''}</p>
          <p><strong>Category:</strong> ${item.category_name || 'No Category'}</p>
          <p><strong>Target:</strong> $${item.target_amount}</p>
          <p><strong>Raised:</strong> $${item.current_amount}</p>
          <p><strong>Status:</strong> ${item.status}</p>
          <p><strong>Created At:</strong> ${item.created_at}</p>
        `;

        list.appendChild(div);
      });
    }

    async function init() {
      await loadCategories();
      await loadCompleted();
    }

    init();
  </script>
</body>
</html>

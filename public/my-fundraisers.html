<!DOCTYPE html>
<html>
<head>
  <title>My Fundraisers</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>My Fundraiser Analytics</h2>
      <a href="/completed-fundraisers.html">View Completed Fundraisers</a>
      <p id="flashMessage" class="flash"></p>
    </div>

    <div id="list"></div>
  </div>

  <script>
    const list = document.getElementById('list');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flashMessage');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function deleteFundraiser(id) {
      const token = localStorage.getItem('token');

      const confirmDelete = confirm('Are you sure you want to delete this fundraiser?');
      if (!confirmDelete) return;

      const res = await fetch(`/api/fundraisers/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();
      showMessage(data.message || data.error, data.error ? 'error' : 'success');
      loadMyFundraisers();
    }

    async function completeFundraiser(id) {
      const token = localStorage.getItem('token');

      const res = await fetch(`/api/fundraisers/${id}/complete`, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();
      showMessage(data.message || data.error, data.error ? 'error' : 'success');
      loadMyFundraisers();
    }

    async function loadMyFundraisers() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      const res = await fetch('/api/fundraisers/mine/list', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = '<div class="card"><p>No fundraisers created yet.</p></div>';
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
          <h3>${item.title}</h3>
          <p><strong>Status:</strong> ${item.status}</p>
          <p><strong>Target:</strong> $${item.target_amount}</p>
          <p><strong>Raised:</strong> $${item.current_amount}</p>
          <p><strong>Views:</strong> ${item.views}</p>
          <p><strong>Favourites:</strong> ${item.favourite_count}</p>
          <p><strong>Donation Count:</strong> ${item.donation_count}</p>
          <p><strong>Total Donated:</strong> $${item.total_donated}</p>
          <div class="list-actions">
            <button class="btn-secondary" onclick="window.location.href='/edit-fundraiser.html?id=${item.id}'">Edit</button>
            <button class="btn-success" onclick="completeFundraiser(${item.id})">Mark Completed</button>
            <button class="btn-danger" onclick="deleteFundraiser(${item.id})">Delete</button>
          </div>
        `;

        list.appendChild(div);
      });
    }

    loadMyFundraisers();
  </script>
</body>
</html>

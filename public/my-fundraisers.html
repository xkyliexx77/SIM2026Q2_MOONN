<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Fundraisers</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="myfund-body">
  <div class="myfund-container">

    <div class="myfund-header">
      <div>
        <h1>My Fundraiser Analytics</h1>
        <p>Track your fundraiser progress, donations, views and favourites.</p>
      </div>

      <div class="myfund-header-actions">
        <a href="completed-fundraisers.html" class="myfund-light-btn">Completed</a>
        <a href="dashboard.html" class="myfund-light-btn">Dashboard</a>
      </div>
    </div>

    <div class="myfund-message-card">
      <p id="myfund-flash" class="flash"></p>
      <p class="myfund-subtext">Manage your created fundraisers below.</p>
    </div>

    <div id="myfund-list" class="myfund-list"></div>

  </div>

  <script>
    const list = document.getElementById('myfund-list');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('myfund-flash');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function deleteFundraiser(id) {
      const token = localStorage.getItem('token');

      const confirmDelete = confirm('Are you sure you want to delete this fundraiser?');
      if (!confirmDelete) return;

      const res = await fetch(`/api/fundraisers/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();
      showMessage(data.message || data.error, data.error ? 'error' : 'success');
      loadMyFundraisers();
    }

    async function completeFundraiser(id) {
      const token = localStorage.getItem('token');

      const confirmComplete = confirm('Mark this fundraiser as completed?');
      if (!confirmComplete) return;

      const res = await fetch(`/api/fundraisers/${id}/complete`, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();
      showMessage(data.message || data.error, data.error ? 'error' : 'success');
      loadMyFundraisers();
    }

    async function loadMyFundraisers() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const res = await fetch('/api/fundraisers/mine/list', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();
      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = `
          <div class="myfund-empty-card">
            <p>No fundraisers created yet.</p>
            <a href="create-fundraiser.html" class="myfund-create-btn">Create Fundraiser</a>
          </div>
        `;
        return;
      }

      data.forEach(item => {
        const raised = Number(item.current_amount || 0);
        const target = Number(item.target_amount || 0);
        const progress = target > 0 ? Math.min((raised / target) * 100, 100).toFixed(0) : 0;

        const div = document.createElement('div');
        div.className = 'myfund-card';

        div.innerHTML = `
          <div class="myfund-card-top">
            <div>
              <h2>${item.title}</h2>
              <span class="myfund-status">${item.status}</span>
            </div>
          </div>

          <div class="myfund-progress-section">
            <div class="myfund-progress-text">
              <span>$${raised} raised</span>
              <span>$${target} target</span>
            </div>

            <div class="myfund-progress-bar">
              <div class="myfund-progress-fill" style="width: ${progress}%"></div>
            </div>

            <p class="myfund-progress-percent">${progress}% completed</p>
          </div>

          <div class="myfund-stats-grid">
            <div>
              <span>Views</span>
              <strong>${item.views || 0}</strong>
            </div>

            <div>
              <span>Favourites</span>
              <strong>${item.favourite_count || 0}</strong>
            </div>

            <div>
              <span>Donation Count</span>
              <strong>${item.donation_count || 0}</strong>
            </div>

            <div>
              <span>Total Donated</span>
              <strong>$${item.total_donated || 0}</strong>
            </div>
          </div>

          <div class="myfund-actions">
            <button class="myfund-edit-btn" onclick="window.location.href='edit-fundraiser.html?id=${item.id}'">Edit</button>
            <button class="myfund-complete-btn" onclick="completeFundraiser(${item.id})">Mark Completed</button>
            <button class="myfund-delete-btn" onclick="deleteFundraiser(${item.id})">Delete</button>
          </div>
        `;

        list.appendChild(div);
      });
    }

    loadMyFundraisers();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Fundraisers</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>My Fundraisers</h1>
        <p>Manage and track your fundraising activities.</p>
      </div>

      <a href="dashboard.html" class="fundraisers-back-btn">Back to Dashboard</a>
    </div>

    <!-- 🔍 SEARCH + FILTER -->
    <div class="fundraisers-filter-card">
      <h2>Search & Filter</h2>

      <div class="fundraisers-filters">
        <div>
          <label>Search</label>
          <input type="text" id="searchInput" placeholder="Search title">
        </div>

        <div>
          <label>Status</label>
          <select id="statusFilter">
            <option value="">All</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
          </select>
        </div>

        <button class="fundraisers-search-btn" onclick="loadMyFundraisers()">Search</button>
      </div>
    </div>

    <div id="list" class="fundraisers-list"></div>

  </div>

  <script>
    const list = document.getElementById('list');

    function getToken() {
      return localStorage.getItem('token');
    }

    async function loadMyFundraisers() {
      const token = getToken();

      const search = document.getElementById('searchInput').value;
      const status = document.getElementById('statusFilter').value;

      const res = await fetch('/api/fundraisers/mine/list', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      let data = await res.json();

      // 🔍 SEARCH
      if (search) {
        data = data.filter(f =>
          f.title.toLowerCase().includes(search.toLowerCase())
        );
      }

      // 🔍 FILTER STATUS
      if (status) {
        data = data.filter(f => f.status === status);
      }

      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = `
          <div class="fundraisers-empty-card">
            <p>No fundraisers found.</p>
          </div>
        `;
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'fundraisers-item-card';

        div.innerHTML = `
          <div class="fundraisers-item-top">
            <div>
              <h3>${item.title}</h3>
              <p>${item.description}</p>
            </div>

            <span class="fundraisers-category-badge">
              ${item.status}
            </span>
          </div>

          <div class="fundraisers-info-grid">
            <div>
              <span>Target</span>
              <strong>$${item.target_amount}</strong>
            </div>

            <div>
              <span>Raised</span>
              <strong>$${item.current_amount}</strong>
            </div>

            <div>
              <span>Views</span>
              <strong>${item.views}</strong>
            </div>

            <div>
              <span>Favourites</span>
              <strong>${item.favourite_count}</strong>
            </div>
          </div>

          <div class="fundraisers-actions">

            <button class="fundraisers-view-btn"
              onclick="window.location.href='edit-fundraiser.html?id=${item.id}'">
              Edit
            </button>

            <button class="fundraisers-fav-btn"
              onclick="deleteFundraiser(${item.id})">
              Delete
            </button>

            ${
              item.status === 'active'
              ? `<button class="fundraisers-donate-btn"
                   onclick="completeFundraiser(${item.id})">
                   Mark Completed
                 </button>`
              : ''
            }

          </div>
        `;

        list.appendChild(div);
      });
    }

    async function deleteFundraiser(id) {
      const token = getToken();

      if (!confirm('Delete this fundraiser?')) return;

      const res = await fetch(`/api/fundraisers/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();
      alert(data.message || data.error);

      loadMyFundraisers();
    }

    async function completeFundraiser(id) {
      const token = getToken();

      const res = await fetch(`/api/fundraisers/${id}/complete`, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();
      alert(data.message || data.error);

      loadMyFundraisers();
    }

    loadMyFundraisers();
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>My Favourites</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>My Favourite Fundraisers</h2>
      <p id="flashMessage" class="flash"></p>
    </div>

    <div id="list"></div>
  </div>

  <script>
    const list = document.getElementById('list');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flashMessage');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function removeFavourite(id) {
      const token = localStorage.getItem('token');

      const res = await fetch(`/api/favourites/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();
      showMessage(data.error || data.message || 'Removed from favourites', data.error ? 'error' : 'success');
      loadFavourites();
    }

    async function loadFavourites() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      const res = await fetch('/api/favourites/mine', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = '<div class="card"><p>No favourites yet.</p></div>';
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
          <h3>${item.title}</h3>
          <p>${item.description}</p>
          <p><strong>Target:</strong> $${item.target_amount}</p>
          <p><strong>Raised:</strong> $${item.current_amount}</p>
          <button class="btn-danger" onclick="removeFavourite(${item.id})">Remove Favourite</button>
        `;

        list.appendChild(div);
      });
    }

    loadFavourites();
  </script>
</body>
</html>

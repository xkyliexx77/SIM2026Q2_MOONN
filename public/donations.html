<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Donations</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="donation-body">
  <div class="donation-container">

    <div class="donation-header">
      <div>
        <h1>My Donation History</h1>
        <p>Make a donation and view your past donations.</p>
      </div>

      <a href="dashboard.html" class="donation-back-btn">Back to Dashboard</a>
    </div>

    <!-- MAKE DONATION -->
    <div class="donation-filter-card">
      <h2>Make Donation</h2>

      <div class="donation-filters">
        <div>
          <label>Fundraiser</label>
          <select id="donation-fundraiser-select"></select>
        </div>

        <div>
          <label>Amount</label>
          <input type="number" id="donation-amount-input" placeholder="Enter amount" min="1">
        </div>

        <button class="donation-filter-btn" onclick="submitDonation()">Donate</button>
      </div>
    </div>

    <!-- FILTER -->
    <div class="donation-filter-card">
      <h2>Filter Donations</h2>

      <div class="donation-filters">
        <div>
          <label>Category</label>
          <select id="donation-category-filter"></select>
        </div>

        <div>
          <label>From</label>
          <input type="date" id="donation-date-from">
        </div>

        <div>
          <label>To</label>
          <input type="date" id="donation-date-to">
        </div>

        <button class="donation-filter-btn" onclick="loadDonations()">Filter</button>
        <button class="donation-clear-btn" onclick="clearDonationFilters()">Clear</button>
      </div>
    </div>

    <div id="donation-list" class="donation-list"></div>

  </div>

  <script>
    const list = document.getElementById('donation-list');

    async function loadCategories() {
      const res = await fetch('/api/categories');
      const categories = await res.json();

      const select = document.getElementById('donation-category-filter');
      select.innerHTML = '<option value="">All Categories</option>';

      categories.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.name;
        select.appendChild(option);
      });
    }

    async function loadFundraiserOptions() {
      const res = await fetch('/api/fundraisers');
      const result = await res.json();
      const fundraisers = result.items || result || [];

      const select = document.getElementById('donation-fundraiser-select');
      select.innerHTML = '<option value="">Select Fundraiser</option>';

      fundraisers.forEach(f => {
        const option = document.createElement('option');
        option.value = f.id;
        option.textContent = `${f.title} - Target $${f.target_amount || 0}`;
        select.appendChild(option);
      });
    }

    async function submitDonation() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const fundraiserId = document.getElementById('donation-fundraiser-select').value;
      const amount = document.getElementById('donation-amount-input').value;

      if (!fundraiserId) {
        alert('Please select a fundraiser.');
        return;
      }

      if (!amount || Number(amount) <= 0) {
        alert('Donation amount must be more than 0.');
        return;
      }

      const res = await fetch('/api/donations', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          fundraiser_id: fundraiserId,
          amount: amount
        })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        alert(data.error || 'Donation failed.');
        return;
      }

      alert(data.message || 'Donation successful.');

      document.getElementById('donation-fundraiser-select').value = '';
      document.getElementById('donation-amount-input').value = '';

      await loadDonations();
      await loadFundraiserOptions();
    }

    function clearDonationFilters() {
      document.getElementById('donation-category-filter').value = '';
      document.getElementById('donation-date-from').value = '';
      document.getElementById('donation-date-to').value = '';
      loadDonations();
    }

    async function loadDonations() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const category = document.getElementById('donation-category-filter').value;
      const dateFrom = document.getElementById('donation-date-from').value;
      const dateTo = document.getElementById('donation-date-to').value;

      const query = new URLSearchParams();

      if (category) query.append('category', category);
      if (dateFrom) query.append('dateFrom', dateFrom);
      if (dateTo) query.append('dateTo', dateTo);

      const res = await fetch(`/api/donations/mine?${query.toString()}`, {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = `
          <div class="donation-empty-card">
            <h3>No donations found</h3>
            <p>You have not made any donations for the selected filter.</p>
            <button class="donation-browse-btn" onclick="scrollToDonationSection()">
              Make Donation
            </button>
          </div>
        `;
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'donation-item-card';

        div.innerHTML = `
          <div class="donation-item-top">
            <div>
              <h3>${item.title}</h3>
              <p>${item.category_name || 'No Category'}</p>
            </div>

            <span class="donation-amount">$${item.amount}</span>
          </div>

          <div class="donation-info-row">
            <span>Donation Date</span>
            <strong>${item.donated_at}</strong>
          </div>
        `;

        list.appendChild(div);
      });
    }

    async function init() {
      await loadCategories();
      await loadFundraiserOptions();
      await loadDonations();
    }

    function scrollToDonationSection() {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Donations</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="donation-body">
  <div class="donation-container">

    <div class="donation-header">
      <div>
        <h1>My Donation History</h1>
        <p>View and filter your past donations.</p>
      </div>

      <a href="dashboard.html" class="donation-back-btn">Back to Dashboard</a>
    </div>

    <div class="donation-filter-card">
      <h2>Filter Donations</h2>

      <div class="donation-filters">
        <div>
          <label>Category</label>
          <select id="donation-category-filter"></select>
        </div>

        <div>
          <label>From</label>
          <input type="date" id="donation-date-from">
        </div>

        <div>
          <label>To</label>
          <input type="date" id="donation-date-to">
        </div>

        <button class="donation-filter-btn" onclick="loadDonations()">Filter</button>
        <button class="donation-clear-btn" onclick="clearDonationFilters()">Clear</button>
      </div>
    </div>

    <div id="donation-list" class="donation-list"></div>

  </div>

  <script>
    const list = document.getElementById('donation-list');

    async function loadCategories() {
      const res = await fetch('/api/categories');
      const categories = await res.json();

      const select = document.getElementById('donation-category-filter');
      select.innerHTML = '<option value="">All Categories</option>';

      categories.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.name;
        select.appendChild(option);
      });
    }

    function clearDonationFilters() {
      document.getElementById('donation-category-filter').value = '';
      document.getElementById('donation-date-from').value = '';
      document.getElementById('donation-date-to').value = '';
      loadDonations();
    }

    async function loadDonations() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const category = document.getElementById('donation-category-filter').value;
      const dateFrom = document.getElementById('donation-date-from').value;
      const dateTo = document.getElementById('donation-date-to').value;

      const query = new URLSearchParams();

      if (category) query.append('category', category);
      if (dateFrom) query.append('dateFrom', dateFrom);
      if (dateTo) query.append('dateTo', dateTo);

      const res = await fetch(`/api/donations/mine?${query.toString()}`, {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = `
          <div class="donation-empty-card">
            <h3>No donations found</h3>
            <p>You have not made any donations for the selected filter.</p>
            <a href="fundraisers.html" class="donation-browse-btn">Browse Fundraisers</a>
          </div>
        `;
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'donation-item-card';

        div.innerHTML = `
          <div class="donation-item-top">
            <div>
              <h3>${item.title}</h3>
              <p>${item.category_name || 'No Category'}</p>
            </div>

            <span class="donation-amount">$${item.amount}</span>
          </div>

          <div class="donation-info-row">
            <span>Donation Date</span>
            <strong>${item.donated_at}</strong>
          </div>
        `;

        list.appendChild(div);
      });
    }

    async function init() {
      await loadCategories();
      await loadDonations();
    }

    init();
  </script>
</body>
</html>

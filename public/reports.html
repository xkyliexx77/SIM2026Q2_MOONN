<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Manager Reports</title>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .comparison-bars {
      display: grid;
      gap: 18px;
      margin-top: 20px;
    }

    .comparison-row {
      display: grid;
      grid-template-columns: 120px 1fr 110px;
      gap: 14px;
      align-items: center;
    }

    .comparison-label {
      color: #2d3436;
      font-weight: 700;
    }

    .comparison-track {
      background: #eeeaff;
      border-radius: 999px;
      overflow: hidden;
      height: 28px;
    }

    .comparison-fill {
      height: 100%;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border-radius: 999px;
      min-width: 2%;
    }

    .comparison-amount {
      color: #2d3436;
      font-weight: 800;
      text-align: right;
    }

    .report-card p {
      color: #2d3436;
    }

    .report-card span,
    .report-summary-grid span {
      color: #636e72;
    }

    .report-card strong,
    .report-summary-grid strong {
      color: #2d3436;
    }

    @media (max-width: 700px) {
      .comparison-row {
        grid-template-columns: 1fr;
      }

      .comparison-amount {
        text-align: left;
      }
    }
  </style>
</head>

<body class="report-body">
  <div class="report-container">

    <div class="report-header">
      <div>
        <h1>Manager Report Dashboard</h1>
        <p>View daily, weekly and monthly donation reports.</p>
      </div>

      <a href="dashboard.html" class="report-back-btn">Back to Dashboard</a>
    </div>

    <p id="report-flash" class="flash"></p>

    <div class="report-summary-card">
      <h2>Overall Summary</h2>
      <div id="report-summary-box" class="report-summary-grid"></div>
    </div>

    <div class="report-mini-grid">
      <div class="report-card">
        <h2>Daily Report</h2>
        <div id="report-daily-box"></div>
      </div>

      <div class="report-card">
        <h2>Weekly Report</h2>
        <div id="report-weekly-box"></div>
      </div>

      <div class="report-card">
        <h2>Monthly Report</h2>
        <div id="report-monthly-box"></div>
      </div>
    </div>

    <div class="report-chart-card">
      <h2>Donation Amount Comparison</h2>
      <p style="color:#636e72;">Compares total donation amount for today, this week and this month.</p>

      <div class="comparison-bars">
        <div class="comparison-row">
          <div class="comparison-label">Daily</div>
          <div class="comparison-track">
            <div id="dailyBar" class="comparison-fill"></div>
          </div>
          <div id="dailyAmount" class="comparison-amount">$0.00</div>
        </div>

        <div class="comparison-row">
          <div class="comparison-label">Weekly</div>
          <div class="comparison-track">
            <div id="weeklyBar" class="comparison-fill"></div>
          </div>
          <div id="weeklyAmount" class="comparison-amount">$0.00</div>
        </div>

        <div class="comparison-row">
          <div class="comparison-label">Monthly</div>
          <div class="comparison-track">
            <div id="monthlyBar" class="comparison-fill"></div>
          </div>
          <div id="monthlyAmount" class="comparison-amount">$0.00</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    const token = localStorage.getItem('token');

    if (!user || !token) {
      window.location.href = 'login.html';
    }

    if (user && user.role !== 'manager') {
      alert('Only platform managers can access reports.');
      window.location.href = 'dashboard.html';
    }

    function showMessage(text, type = 'error') {
      const msg = document.getElementById('report-flash');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';
    }

    async function fetchReport(url) {
      const res = await fetch(url, {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Failed to load report data.');
      }

      return data;
    }

    function money(value) {
      return `$${Number(value || 0).toFixed(2)}`;
    }

    function setBar(barId, amountId, value, max) {
      const amount = Number(value || 0);
      const percent = max > 0 ? Math.max((amount / max) * 100, 2) : 2;

      document.getElementById(barId).style.width = percent + '%';
      document.getElementById(amountId).textContent = money(amount);
    }

    async function loadReports() {
      try {
        const summary = await fetchReport('/api/reports/summary');
        const daily = await fetchReport('/api/reports/daily');
        const weekly = await fetchReport('/api/reports/weekly');
        const monthly = await fetchReport('/api/reports/monthly');
        const comparison = await fetchReport('/api/reports/comparison');

        document.getElementById('report-summary-box').innerHTML = `
          <div><span>Total Users</span><strong>${summary.total_users || 0}</strong></div>
          <div><span>Total Categories</span><strong>${summary.total_categories || 0}</strong></div>
          <div><span>Total Fundraisers</span><strong>${summary.total_fundraisers || 0}</strong></div>
          <div><span>Total Favourites</span><strong>${summary.total_favourites || 0}</strong></div>
          <div><span>Total Donations</span><strong>${summary.total_donations || 0}</strong></div>
          <div><span>Total Donation Amount</span><strong>${money(summary.total_donation_amount)}</strong></div>
        `;

        document.getElementById('report-daily-box').innerHTML = `
          <p><span>Donation Count</span><strong>${daily.donation_count || 0}</strong></p>
          <p><span>Donation Amount</span><strong>${money(daily.donation_amount)}</strong></p>
        `;

        document.getElementById('report-weekly-box').innerHTML = `
          <p><span>Donation Count</span><strong>${weekly.donation_count || 0}</strong></p>
          <p><span>Donation Amount</span><strong>${money(weekly.donation_amount)}</strong></p>
        `;

        document.getElementById('report-monthly-box').innerHTML = `
          <p><span>Donation Count</span><strong>${monthly.donation_count || 0}</strong></p>
          <p><span>Donation Amount</span><strong>${money(monthly.donation_amount)}</strong></p>
        `;

        const dailyAmount = Number(comparison.daily_amount || 0);
        const weeklyAmount = Number(comparison.weekly_amount || 0);
        const monthlyAmount = Number(comparison.monthly_amount || 0);
        const maxAmount = Math.max(dailyAmount, weeklyAmount, monthlyAmount);

        setBar('dailyBar', 'dailyAmount', dailyAmount, maxAmount);
        setBar('weeklyBar', 'weeklyAmount', weeklyAmount, maxAmount);
        setBar('monthlyBar', 'monthlyAmount', monthlyAmount, maxAmount);

      } catch (error) {
        showMessage(error.message || 'Something went wrong.');
      }
    }

    loadReports();
  </script>
</body>
</html>

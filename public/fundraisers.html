<!DOCTYPE html>
<html>
<head>
  <title>All Fundraisers</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>All Fundraisers</h2>
      <p id="flashMessage" class="flash"></p>

      <div class="inline-filters">
        <div>
          <label>Search title</label>
          <input type="text" id="searchInput" placeholder="Search title">
        </div>

        <div>
          <label>Category</label>
          <select id="categoryFilter"></select>
        </div>

        <div></div>

        <div>
          <button class="btn-primary" onclick="loadFundraisers()">Search</button>
        </div>
      </div>
    </div>

    <div id="list"></div>
  </div>

  <script>
    const list = document.getElementById('list');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flashMessage');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function loadCategories() {
      const res = await fetch('/api/categories');
      const categories = await res.json();

      const select = document.getElementById('categoryFilter');
      select.innerHTML = '<option value="">All Categories</option>';

      categories.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.name;
        select.appendChild(option);
      });
    }

    async function recordView(id) {
      await fetch(`/api/fundraisers/${id}/view`, {
        method: 'PATCH'
      });
    }

    async function favourite(id) {
      const token = localStorage.getItem('token');

      if (!token) {
        showMessage('Please login first', 'error');
        return;
      }

      const res = await fetch('/api/favourites', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ fundraiser_id: id })
      });

      const data = await res.json();
      showMessage(data.error || data.message || 'Added to favourites', data.error ? 'error' : 'success');
      loadFundraisers();
    }

    async function donate(id) {
      const token = localStorage.getItem('token');

      if (!token) {
        showMessage('Please login first', 'error');
        return;
      }

      const amount = prompt('Enter donation amount:');
      if (amount === null) return;

      const res = await fetch('/api/donations', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ fundraiser_id: id, amount })
      });

      const data = await res.json();
      showMessage(data.error || data.message || 'Donation successful', data.error ? 'error' : 'success');
      loadFundraisers();
    }

    async function viewDetails(id) {
      await recordView(id);
      showMessage('View recorded', 'success');
      loadFundraisers();
    }

    async function loadFundraisers() {
      const search = document.getElementById('searchInput').value;
      const category = document.getElementById('categoryFilter').value;

      const res = await fetch(`/api/fundraisers?search=${encodeURIComponent(search)}&category=${encodeURIComponent(category)}`);
      const data = await res.json();

      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = `<div class="card"><p>No fundraisers found.</p></div>`;
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
          <h3>${item.title}</h3>
          <p>${item.description}</p>
          <p><strong>Target:</strong> $${item.target_amount}</p>
          <p><strong>Raised:</strong> $${item.current_amount}</p>
          <p><strong>Category:</strong> ${item.category_name || 'No Category'}</p>
          <p><strong>Views:</strong> ${item.views}</p>
          <p><strong>Favourites:</strong> ${item.favourite_count}</p>
          <p><strong>Created By:</strong> ${item.fundraiser_name || 'Unknown'}</p>

          <div class="list-actions">
            <button class="btn-secondary" onclick="viewDetails(${item.id})">View</button>
            <button class="btn-primary" onclick="favourite(${item.id})">Favourite</button>
            <button class="btn-success" onclick="donate(${item.id})">Donate</button>
          </div>
        `;

        list.appendChild(div);
      });
    }

    loadCategories();
    loadFundraisers();
  </script>
</body>
</html>

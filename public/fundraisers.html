<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Fundraisers</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>All Fundraisers</h1>
        <p>Browse, search and support fundraising campaigns.</p>
      </div>

      <a href="dashboard.html" class="fundraisers-back-btn">Back to Dashboard</a>
    </div>

    <div class="fundraisers-filter-card">
      <h2>Search Fundraisers</h2>
      <p id="fundraisers-flash" class="flash"></p>

      <div class="fundraisers-filters">
        <div>
          <label>Search Title</label>
          <input type="text" id="fundraisers-search-input" placeholder="Enter fundraiser title">
        </div>

        <div>
          <label>Category</label>
          <select id="fundraisers-category-filter"></select>
        </div>

        <button class="fundraisers-search-btn" onclick="loadFundraisers()">Search</button>
        <button class="fundraisers-clear-btn" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div id="fundraisers-list" class="fundraisers-list"></div>

  </div>

  <!-- DONATION MODAL -->
  <div id="donate-modal-overlay" class="donate-modal-overlay">
    <div class="donate-modal">
      <h2>Make a Donation</h2>
      <p>Enter the amount you would like to donate.</p>

      <input type="hidden" id="donate-fundraiser-id">

      <label>Donation Amount</label>
      <input type="number" id="donate-amount" placeholder="Enter amount" min="1">

      <div class="donate-modal-actions">
        <button class="donate-cancel-btn" onclick="closeDonateModal()">Cancel</button>
        <button class="donate-confirm-btn" onclick="submitDonation()">Donate</button>
      </div>
    </div>
  </div>

  <script>
    const list = document.getElementById('fundraisers-list');

    const user = JSON.parse(localStorage.getItem('user'));
    if (user && user.role) {
      document.body.classList.add(`fundraisers-${user.role}`);
    }

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('fundraisers-flash');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function loadCategories() {
      const res = await fetch('/api/categories');
      const categories = await res.json();

      const select = document.getElementById('fundraisers-category-filter');
      select.innerHTML = '<option value="">All Categories</option>';

      categories.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.name;
        select.appendChild(option);
      });
    }

    function clearFilters() {
      document.getElementById('fundraisers-search-input').value = '';
      document.getElementById('fundraisers-category-filter').value = '';
      loadFundraisers();
    }

    async function recordView(id) {
      await fetch(`/api/fundraisers/${id}/view`, {
        method: 'PATCH'
      });
    }

    async function openFundraiser(id) {
      await recordView(id);
      window.location.href = `fundraiser-detail.html?id=${id}`;
    }

    async function favourite(id) {
      const token = localStorage.getItem('token');

      if (!token) {
        showMessage('Please login first.', 'error');
        return;
      }

      const res = await fetch('/api/favourites', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ fundraiser_id: id })
      });

      const data = await res.json();
      showMessage(data.error || data.message || 'Added to favourites.', data.error ? 'error' : 'success');
      loadFundraisers();
    }

    function donate(id) {
      const token = localStorage.getItem('token');

      if (!token) {
        showMessage('Please login first.', 'error');
        return;
      }

      document.getElementById('donate-fundraiser-id').value = id;
      document.getElementById('donate-amount').value = '';
      document.getElementById('donate-modal-overlay').style.display = 'flex';
    }

    function closeDonateModal() {
      document.getElementById('donate-modal-overlay').style.display = 'none';
    }

    async function submitDonation() {
      const token = localStorage.getItem('token');
      const id = document.getElementById('donate-fundraiser-id').value;
      const amount = document.getElementById('donate-amount').value;

      if (!amount || Number(amount) <= 0) {
        showMessage('Donation amount must be more than 0.', 'error');
        return;
      }

      const res = await fetch('/api/donations', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ fundraiser_id: id, amount })
      });

      const data = await res.json();

      showMessage(
        data.error || data.message || 'Donation successful.',
        data.error ? 'error' : 'success'
      );

      closeDonateModal();
      loadFundraisers();
    }

    async function viewDetails(id) {
      await recordView(id);
      showMessage('View recorded.', 'success');
      loadFundraisers();
    }

    async function loadFundraisers() {
      const search = document.getElementById('fundraisers-search-input').value.trim();
      const category = document.getElementById('fundraisers-category-filter').value;

      const query = new URLSearchParams();

      if (search) query.append('search', search);
      if (category) query.append('category', category);

      const res = await fetch(`/api/fundraisers?${query.toString()}`);
      const result = await res.json();

      const data = result.items || result || [];

      list.innerHTML = '';

      if (!data.length) {
        list.innerHTML = `
          <div class="fundraisers-empty-card">
            <p>No fundraisers found.</p>
          </div>
        `;
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'fundraisers-item-card';
        div.style.cursor = 'pointer';

        div.onclick = function () {
          openFundraiser(item.id);
        };

        div.innerHTML = `
          <div class="fundraisers-item-top">
            <div>
              <h3>${item.title}</h3>
              <p>${item.description || 'No description provided.'}</p>
            </div>

            <span class="fundraisers-category-badge">
              ${item.category_name || 'No Category'}
            </span>
          </div>

          <div class="fundraisers-info-grid">
            <div>
              <span>Target</span>
              <strong>$${item.target_amount || 0}</strong>
            </div>

            <div>
              <span>Raised</span>
              <strong>$${item.current_amount || 0}</strong>
            </div>

            <div>
              <span>Views</span>
              <strong>${item.views || 0}</strong>
            </div>

            <div>
              <span>Favourites</span>
              <strong>${item.favourite_count || 0}</strong>
            </div>
          </div>

          <p class="fundraisers-created-by">
            Created By: <strong>${item.fundraiser_name || 'Unknown'}</strong>
          </p>

          <div class="fundraisers-actions">
            <button class="fundraisers-fav-btn" onclick="event.stopPropagation(); favourite(${item.id})">♡ Favourite</button>
            <button class="fundraisers-donate-btn" onclick="event.stopPropagation(); donate(${item.id})">Donate</button>          </div>
        `;

        list.appendChild(div);
      });
    }

    loadCategories();
    loadFundraisers();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body id="dashboard-page-body" class="dashboard-page-body">

  <div class="dashboard-main-container">

    <div id="dashboard-role-banner" class="dashboard-role-banner">
      <div>
        <p id="dashboard-role-label" class="dashboard-role-label"></p>
        <h1 id="dashboard-title">Dashboard</h1>
        <p id="dashboard-welcome"></p>
      </div>

      <button class="dashboard-logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="dashboard-content-grid">

      <div class="dashboard-profile-panel">
        <h2>My Profile</h2>

        <div class="dashboard-avatar" id="dashboard-initial">U</div>

        <p><strong>Name:</strong> <span id="dashboard-name"></span></p>
        <p><strong>Email:</strong> <span id="dashboard-email"></span></p>
        <p><strong>Role:</strong> <span id="dashboard-role"></span></p>
      </div>

      <div class="dashboard-action-panel">
        <h2 id="dashboard-action-title">Quick Actions</h2>
        <p id="dashboard-action-subtitle" class="dashboard-subtext"></p>

        <div id="dashboard-menu" class="dashboard-menu"></div>
      </div>

    </div>

  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));

    if (!user) {
      window.location.href = 'login.html';
    } else {
      const role = user.role;

      document.body.classList.add(`dashboard-${role}`);

      document.getElementById('dashboard-welcome').textContent =
        `Welcome back, ${user.name}`;

      document.getElementById('dashboard-name').textContent = user.name || '-';
      document.getElementById('dashboard-email').textContent = user.email || '-';
      document.getElementById('dashboard-role').textContent = role || '-';
      document.getElementById('dashboard-initial').textContent =
        user.name ? user.name.charAt(0).toUpperCase() : 'U';

      const menu = document.getElementById('dashboard-menu');

      if (role === 'manager') {
        document.getElementById('dashboard-role-label').textContent = 'Manager Workspace';
        document.getElementById('dashboard-title').textContent = 'Management Dashboard';
        document.getElementById('dashboard-action-subtitle').textContent =
          'Manage platform categories, fundraisers and reports.';

        menu.innerHTML = `
          <a class="dashboard-action-card" href="categories.html">
            <span>Category Control</span>
            <small>Create, edit and delete categories</small>
          </a>

          <a class="dashboard-action-card" href="fundraisers.html">
            <span>Fundraiser Overview</span>
            <small>View all fundraising campaigns</small>
          </a>

          <a class="dashboard-action-card" href="reports.html">
            <span>Reports & Analytics</span>
            <small>View donation and platform summary</small>
          </a>
        `;
      }

      else if (role === 'fundraiser') {
        document.getElementById('dashboard-role-label').textContent = 'Fundraiser Workspace';
        document.getElementById('dashboard-title').textContent = 'Fundraiser Dashboard';
        document.getElementById('dashboard-action-subtitle').textContent =
          'Create campaigns and monitor your fundraiser performance.';

        menu.innerHTML = `
          <a class="dashboard-action-card" href="create-fundraiser.html">
            <span>Create Fundraiser</span>
            <small>Start a new fundraising campaign</small>
          </a>

          <a class="dashboard-action-card" href="fundraisers.html">
            <span>Explore Fundraisers</span>
            <small>View all available fundraising campaigns</small>
          </a>

          <a class="dashboard-action-card" href="my-fundraisers.html">
            <span>My Analytics</span>
            <small>Track views, donations and favourites</small>
          </a>
        `;
      }

      else if (role === 'donee') {
        document.getElementById('dashboard-role-label').textContent = 'Donee Workspace';
        document.getElementById('dashboard-title').textContent = 'Donation Dashboard';
        document.getElementById('dashboard-action-subtitle').textContent =
          'Browse fundraisers, save favourites and manage your donations.';

        menu.innerHTML = `
          <a class="dashboard-action-card" href="fundraisers.html">
            <span>Browse Fundraisers</span>
            <small>Find campaigns you want to support</small>
          </a>

          <a class="dashboard-action-card" href="favourites.html">
            <span>My Favourites</span>
            <small>View your saved fundraising campaigns</small>
          </a>

          <a class="dashboard-action-card" href="donations.html">
            <span>My Donations</span>
            <small>Track your donation history</small>
          </a>
        `;
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }
  </script>

</body>
</html>

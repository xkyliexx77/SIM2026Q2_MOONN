<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Fundraising System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-body">
  <div class="auth-wrapper">

    <div class="auth-left">
      <h1>Fundraising Management System</h1>
      <p>
        Login to manage fundraisers, donations, categories and reports in one platform.
      </p>
    </div>

    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Please login to continue</p>

      <p id="flashMessage" class="flash"></p>

      <form id="loginForm">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit" class="btn-primary auth-btn">Login</button>
      </form>

      <p class="auth-link-text">
        Don’t have an account?
        <a href="register.html">Create an account</a>
      </p>
    </div>

  </div>

  <script>
    const form = document.getElementById('loginForm');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flashMessage');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const loginData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(loginData)
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          showMessage('Login successful. Redirecting...', 'success');

          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 800);
        } else {
          showMessage(data.error || 'Login failed.', 'error');
        }
      } catch (error) {
        showMessage('Something went wrong. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>

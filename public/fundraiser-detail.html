<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fundraiser Details</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>Fundraiser Details</h1>
        <p>View full campaign details and performance.</p>
      </div>

      <a href="dashboard.html" class="fundraisers-back-btn">Back</a>
    </div>

    <div id="detailBox" class="fundraisers-item-card"></div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    const user = JSON.parse(localStorage.getItem('user'));
    const token = localStorage.getItem('token');

    const isDonee = user && user.role === 'donee';

    function calcProgress(raised, target) {
    const r = Number(raised || 0);
    const t = Number(target || 0);
    if (t === 0) return 0;
    const percentage = (r / t) * 100;
    if (percentage > 100) return 100;
    return percentage.toFixed(2);
    }

    async function loadDetails() {
      let res;

      if (user && user.role === 'fundraiser') {
        res = await fetch('/api/fundraisers/mine/list', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
      } else {
        res = await fetch('/api/fundraisers');
      }

      const result = await res.json();
      const data = result.items || result || [];
      const item = data.find(f => String(f.id) === String(id));

      if (!item) {
        document.getElementById('detailBox').innerHTML = `
          <div class="fundraisers-empty-card">
            <p>Fundraiser not found.</p>
          </div>
        `;
        return;
      }

      const progress = calcProgress(item.current_amount, item.target_amount);
      const isCompleted = item.status && item.status.toLowerCase() === 'completed';

      document.getElementById('detailBox').innerHTML = `
        <div class="fundraisers-item-top">
          <div>
            <h3>${item.title}</h3>
            <p>${item.description || ''}</p>
          </div>

          <span class="fundraisers-category-badge">
            ${item.category_name || 'No Category'}
          </span>
        </div>

        <hr>

        <div class="fundraisers-info-grid">
          <div>
            <span>Target</span>
            <strong>$${item.target_amount || 0}</strong>
          </div>

          <div>
            <span>Raised</span>
            <strong>$${item.current_amount || 0}</strong>
          </div>

          ${!isDonee ? `
            <div>
              <span>Views</span>
              <strong>${item.views || 0}</strong>
            </div>

            <div>
              <span>Favourites</span>
              <strong>${item.favourite_count || 0}</strong>
            </div>

            <div>
              <span>Donations</span>
              <strong>${item.donation_count || 0}</strong>
            </div>

            <div>
              <span>Status</span>
              <strong>${item.status || 'active'}</strong>
            </div>
          ` : ''}
        </div>

        <p class="fundraisers-created-by">
          Created By: <strong>${item.fundraiser_name || 'Unknown'}</strong>
        </p>

        ${user && user.role === 'fundraiser' ? `
          <div class="fundraisers-actions" style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">

            <button class="fundraisers-view-btn"
              onclick="window.location.href='edit-fundraiser.html?id=${item.id}'">
              Edit
            </button>

            ${!isCompleted ? `
              <button class="fundraisers-complete-btn"
                onclick="markCompleted(${item.id})">
                Complete
              </button>
            ` : ''}

            <button class="fundraisers-delete-btn"
              onclick="deleteFundraiser(${item.id})">
              Delete
            </button>

          </div>
        ` : ''}

        <div style="margin-top:20px;">
          <p><strong>Progress:</strong> ${progress}%</p>

          <div style="width:100%;background:#e5e7eb;border-radius:20px;overflow:hidden;">
            <div style="
              width:${progress}%;
              background:linear-gradient(90deg,#2ecc71,#27ae60);
              color:white;
              text-align:center;
              padding:6px 0;
              font-weight:bold;">
              ${progress}%
            </div>
          </div>
        </div>
      `;
    }

    async function markCompleted(id) {
      if (!confirm('Mark this fundraiser as completed?')) return;

      const res = await fetch(`/api/fundraisers/${id}/complete`, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      alert(data.message || data.error || 'Fundraiser updated');

      loadDetails();
    }

    async function deleteFundraiser(id) {
      if (!confirm('Delete this fundraiser? This cannot be undone.')) return;

      const res = await fetch(`/api/fundraisers/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await res.json();

      alert(data.message || data.error || 'Fundraiser deleted');

      window.location.href = 'my-fundraisers.html';
    }

    loadDetails();
  </script>
</body>
</html>

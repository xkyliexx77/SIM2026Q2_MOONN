<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fundraiser Details</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <div class="fundraisers-header">
      <div>
        <h1>Fundraiser Details</h1>
        <p>View full campaign details and performance.</p>
      </div>

      <a href="dashboard.html" class="fundraisers-back-btn">Back</a>
    </div>

    <div id="detailBox" class="fundraisers-item-card"></div>

  </div>

  <!-- DONATION MODAL -->
  <div id="donate-modal-overlay" class="donate-modal-overlay">
    <div class="donate-modal">
      <h2>Make a Donation</h2>
      <p>Enter the amount you would like to donate.</p>

      <input type="hidden" id="donate-fundraiser-id">

      <label>Donation Amount</label>
      <input type="number" id="donate-amount" placeholder="Enter amount" min="1">

      <div class="donate-modal-actions">
        <button class="donate-cancel-btn" onclick="closeDonateModal()">Cancel</button>
        <button class="donate-confirm-btn" onclick="submitDonation()">Donate</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    const user = JSON.parse(localStorage.getItem('user'));
    const token = localStorage.getItem('token');

    if (!user) {
      window.location.href = 'login.html';
    }

    const isDonee = user && user.role === 'donee';

    function calcProgress(raised, target) {
      const r = Number(raised || 0);
      const t = Number(target || 0);
      if (t === 0) return 0;
      const percentage = (r / t) * 100;
      if (percentage > 100) return 100;
      return percentage.toFixed(2);
    }

    function showAlert(message) {
      alert(message);
    }

    async function loadDetails() {
      let res;

      if (user && user.role === 'fundraiser') {
        res = await fetch('/api/fundraisers/mine/list', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
      } else {
        res = await fetch('/api/fundraisers');
      }

      const result = await res.json();
      const data = result.items || result || [];
      const item = data.find(f => String(f.id) === String(id));

      if (!item) {
        document.getElementById('detailBox').innerHTML = `
          <div class="fundraisers-empty-card">
            <p>Fundraiser not found.</p>
          </div>
        `;
        return;
      }

      const progress = calcProgress(item.current_amount, item.target_amount);

      document.getElementById('detailBox').innerHTML = `
        <div class="fundraisers-item-top">
          <div>
            <h3>${item.title || 'No Title'}</h3>
            <p>${item.description || 'No description provided.'}</p>
          </div>

          <span class="fundraisers-category-badge">
            ${item.category_name || 'No Category'}
          </span>
        </div>

        <hr>

        <div class="fundraisers-info-grid">
          <div>
            <span>Target</span>
            <strong>$${item.target_amount || 0}</strong>
          </div>

          <div>
            <span>Raised</span>
            <strong>$${item.current_amount || 0}</strong>
          </div>

          ${!isDonee ? `
            <div>
              <span>Views</span>
              <strong>${item.views || 0}</strong>
            </div>

            <div>
              <span>Favourites</span>
              <strong>${item.favourite_count || 0}</strong>
            </div>

            <div>
              <span>Donations</span>
              <strong>${item.donation_count || 0}</strong>
            </div>

            <div>
              <span>Status</span>
              <strong>${item.status || 'active'}</strong>
            </div>
          ` : ''}
        </div>

        <p class="fundraisers-created-by">
          Created By: <strong>${item.fundraiser_name || 'Unknown'}</strong>
        </p>

        ${isDonee ? `
          <div class="fundraisers-actions" style="margin-top:20px;">
            <button class="fundraisers-donate-btn" onclick="openDonateModal(${item.id})">
              Donate
            </button>

            <button class="fundraisers-fav-btn" onclick="favourite(${item.id})">
              ♡ Favourite
            </button>
          </div>
        ` : ''}

        <div style="margin-top:20px;">
          <p><strong>Progress:</strong> ${progress}%</p>

          <div style="width:100%;background:#e5e7eb;border-radius:20px;overflow:hidden;">
            <div style="
              width:${progress}%;
              background:linear-gradient(90deg,#2ecc71,#27ae60);
              color:white;
              text-align:center;
              padding:6px 0;
              font-weight:bold;">
              ${progress}%
            </div>
          </div>
        </div>
      `;
    }

    function openDonateModal(id) {
      if (!isDonee) {
        showAlert('Only donees can donate.');
        return;
      }

      document.getElementById('donate-fundraiser-id').value = id;
      document.getElementById('donate-amount').value = '';
      document.getElementById('donate-modal-overlay').style.display = 'flex';
    }

    function closeDonateModal() {
      document.getElementById('donate-modal-overlay').style.display = 'none';
    }

    async function submitDonation() {
      const fundraiserId = document.getElementById('donate-fundraiser-id').value;
      const amount = document.getElementById('donate-amount').value;

      if (!isDonee) {
        showAlert('Only donees can donate.');
        return;
      }

      if (!amount || Number(amount) <= 0) {
        showAlert('Donation amount must be more than 0.');
        return;
      }

      const res = await fetch('/api/donations', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          fundraiser_id: fundraiserId,
          amount: amount
        })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showAlert(data.error || 'Donation failed.');
        return;
      }

      showAlert(data.message || 'Donation successful.');
      closeDonateModal();
      loadDetails();
    }

    async function favourite(id) {
      if (!isDonee) {
        showAlert('Only donees can favourite campaigns.');
        return;
      }

      const res = await fetch('/api/favourites', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ fundraiser_id: id })
      });

      const data = await res.json();
      showAlert(data.error || data.message || 'Added to favourites.');
      loadDetails();
    }

    loadDetails();
  </script>
</body>
</html>

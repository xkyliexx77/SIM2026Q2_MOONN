<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fundraiser Details</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="fundraisers-body">
  <div class="fundraisers-container">

    <!-- HEADER -->
    <div class="fundraisers-header">
      <div>
        <h1>Fundraiser Details</h1>
        <p>View full campaign details and performance.</p>
      </div>

      <a href="my-fundraisers.html" class="fundraisers-back-btn">Back</a>
    </div>

    <!-- MAIN CARD -->
    <div id="detailBox" class="fundraisers-item-card"></div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    function calcProgress(raised, target) {
      const r = Number(raised || 0);
      const t = Number(target || 0);
      if (t === 0) return 0;
      const p = Math.round((r / t) * 100);
      return p > 100 ? 100 : p;
    }

    async function loadDetails() {
      const token = localStorage.getItem('token');

      const res = await fetch('/api/fundraisers/mine/list', {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      const data = await res.json();
      const item = data.find(f => String(f.id) === String(id));

      if (!item) {
        document.getElementById('detailBox').innerHTML =
          `<div class="fundraisers-empty-card"><p>Fundraiser not found.</p></div>`;
        return;
      }

      const progress = calcProgress(item.current_amount, item.target_amount);

      document.getElementById('detailBox').innerHTML = `
        <div class="fundraisers-item-top">
          <div>
            <h2>${item.title}</h2>
            <p>${item.description}</p>
          </div>

          <span class="fundraisers-category-badge">
            ${item.status}
          </span>
        </div>

        <hr>

        <p><strong>Long Description:</strong></p>
        <p>${item.long_description || 'No additional details provided.'}</p>

        <div class="fundraisers-info-grid">
          <div>
            <span>Target</span>
            <strong>$${item.target_amount || 0}</strong>
          </div>

          <div>
            <span>Raised</span>
            <strong>$${item.current_amount || 0}</strong>
          </div>

          <div>
            <span>Views</span>
            <strong>${item.views || 0}</strong>
          </div>

          <div>
            <span>Favourites</span>
            <strong>${item.favourite_count || 0}</strong>
          </div>
        </div>

        <div style="margin-top:20px;">
          <p><strong>Progress:</strong> ${progress}%</p>

          <div style="width:100%;background:#e5e7eb;border-radius:20px;">
            <div style="
              width:${progress}%;
              background:linear-gradient(90deg,#2ecc71,#27ae60);
              color:white;
              text-align:center;
              padding:6px 0;
              font-weight:bold;">
              ${progress}%
            </div>
          </div>
        </div>
      `;
    }

    loadDetails();
  </script>
</body>
</html>

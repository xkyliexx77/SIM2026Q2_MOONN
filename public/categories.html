<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category Management</title>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .category-search-card {
      background: white;
      padding: 24px;
      border-radius: 18px;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(108, 92, 231, 0.12);
    }

    .category-search-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .category-search-row input {
      flex: 1;
    }

    .category-clear-btn {
      background: #dfe6e9;
      color: #2d3436;
    }
  </style>
</head>

<body class="category-body">
  <div class="category-container">

    <div class="category-header">
      <div>
        <h1>Category Management</h1>
        <p>Create, edit, search and manage fundraiser categories.</p>
      </div>

      <a href="dashboard.html" class="category-back-btn">
        Back to Dashboard
      </a>
    </div>

    <!-- ADD CATEGORY -->
    <div class="category-form-card">
      <h2>Add New Category</h2>

      <p id="category-flash" class="flash"></p>

      <form id="category-form">

        <label>Category Name</label>

        <input
          type="text"
          id="category-name"
          placeholder="Enter category name"
          required
        >

        <button type="submit" class="category-add-btn">
          Add Category
        </button>

      </form>
    </div>

    <!-- SEARCH CATEGORY -->
    <div class="category-search-card">
      <h2>Search Categories</h2>

    <div class="category-search-row">

      <input
        type="text"
        id="category-search"
        placeholder="Search category name..."
      >

      <button
        class="category-add-btn"
        onclick="searchCategories()"
      >
        Search
      </button>

      <button
        class="category-clear-btn"
        onclick="clearSearch()"
      >
        Clear
      </button>

    </div>
    </div>

    <!-- CATEGORY LIST -->
    <div class="category-list-card">
      <h2>Category List</h2>

      <div id="category-list" class="category-list"></div>
    </div>

  </div>

  <!-- EDIT MODAL -->
  <div id="category-modal-overlay" class="category-modal-overlay">

    <div class="category-modal">

      <h2>Edit Category</h2>

      <p class="category-modal-text">
        Update the category name below.
      </p>

      <input type="hidden" id="edit-category-id">

      <label>Category Name</label>

      <input type="text" id="edit-category-name">

      <div class="category-modal-actions">

        <button
          class="category-cancel-btn"
          onclick="closeEditModal()"
        >
          Cancel
        </button>

        <button
          class="category-save-btn"
          onclick="saveEditCategory()"
        >
          Save Changes
        </button>

      </div>

    </div>

  </div>

  <script>

    const form = document.getElementById('category-form');
    const categoryList = document.getElementById('category-list');

    let allCategories = [];

    function showMessage(text, type = 'success') {

      const msg = document.getElementById('category-flash');

      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    function getToken() {

      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = 'login.html';
        return null;
      }

      return token;
    }

    async function loadCategories() {

      const response = await fetch('/api/categories');

      const categories = await response.json();

      allCategories = categories;

      renderCategories(allCategories);
    }

    function renderCategories(categories) {

      categoryList.innerHTML = '';

      if (!categories.length) {

        categoryList.innerHTML = `
          <div class="category-empty">
            No categories found.
          </div>
        `;

        return;
      }

      categories.forEach(category => {

        const div = document.createElement('div');

        div.className = 'category-item';

        div.innerHTML = `
          <div>
            <h3>${category.name}</h3>
            <p>Category ID: ${category.id}</p>
          </div>

          <div class="category-actions">

            <button
              class="category-edit-btn"
              onclick="openEditModal(${category.id}, '${category.name.replace(/'/g, "\\'")}')"
            >
              Edit
            </button>

            <button
              class="category-delete-btn"
              onclick="deleteCategory(${category.id})"
            >
              Delete
            </button>

          </div>
        `;

        categoryList.appendChild(div);
      });
    }

    function searchCategories() {

      const keyword =
        document.getElementById('category-search')
        .value
        .toLowerCase();

      const filtered = allCategories.filter(category =>
        category.name.toLowerCase().includes(keyword)
      );

      renderCategories(filtered);
    }

    function clearSearch() {

      document.getElementById('category-search').value = '';

      renderCategories(allCategories);
    }

    form.addEventListener('submit', async function (e) {

      e.preventDefault();

      const token = getToken();

      if (!token) return;

      const name =
        document.getElementById('category-name')
        .value
        .trim();

      if (!name) {

        showMessage(
          'Category name is required.',
          'error'
        );

        return;
      }

      try {

        const response = await fetch('/api/categories', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ name })
        });

        const data = await response.json();

        if (response.ok) {

          showMessage(
            'Category added successfully.',
            'success'
          );

          form.reset();

          loadCategories();

        } else {

          showMessage(
            data.error || 'Failed to add category.',
            'error'
          );
        }

      } catch (error) {

        showMessage(
          'Something went wrong.',
          'error'
        );
      }
    });

    function openEditModal(id, name) {

      document.getElementById('edit-category-id').value = id;

      document.getElementById('edit-category-name').value = name;

      document.getElementById('category-modal-overlay').style.display = 'flex';
    }

    function closeEditModal() {

      document.getElementById('category-modal-overlay').style.display = 'none';
    }

    async function saveEditCategory() {

      const token = getToken();

      if (!token) return;

      const id =
        document.getElementById('edit-category-id').value;

      const name =
        document.getElementById('edit-category-name')
        .value
        .trim();

      if (!name) {

        showMessage(
          'Category name cannot be empty.',
          'error'
        );

        return;
      }

      try {

        const response = await fetch(`/api/categories/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ name })
        });

        const data = await response.json();

        if (response.ok) {

          showMessage(
            'Category updated successfully.',
            'success'
          );

          closeEditModal();

          loadCategories();

        } else {

          showMessage(
            data.error || 'Failed to update category.',
            'error'
          );
        }

      } catch (error) {

        showMessage(
          'Something went wrong.',
          'error'
        );
      }
    }

    async function deleteCategory(id) {

      const token = getToken();

      if (!token) return;

      const confirmDelete = confirm(
        'Are you sure you want to delete this category?'
      );

      if (!confirmDelete) return;

      try {

        const response = await fetch(`/api/categories/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });

        const data = await response.json();

        if (response.ok) {

          showMessage(
            'Category deleted successfully.',
            'success'
          );

          loadCategories();

        } else {

          showMessage(
            data.error || 'Failed to delete category.',
            'error'
          );
        }

      } catch (error) {

        showMessage(
          'Something went wrong.',
          'error'
        );
      }
    }

    loadCategories();

  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Category Management</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Category Management</h2>
      <p id="flashMessage" class="flash"></p>

      <form id="categoryForm">
        <label>Category Name</label>
        <input type="text" id="categoryName" placeholder="Enter category name" required>
        <button type="submit" class="btn-primary">Add Category</button>
      </form>
    </div>

    <div class="card">
      <h3>Category List</h3>
      <ul id="categoryList"></ul>
    </div>
  </div>

  <script>
    const form = document.getElementById('categoryForm');
    const categoryList = document.getElementById('categoryList');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flashMessage');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function loadCategories() {
      const response = await fetch('/api/categories');
      const categories = await response.json();

      categoryList.innerHTML = '';

      categories.forEach(category => {
        const li = document.createElement('li');
        li.style.marginBottom = '10px';
        li.innerHTML = `
          ${category.id} - ${category.name}
          <button class="btn-secondary" onclick="editCategory(${category.id}, '${category.name.replace(/'/g, "\\'")}')">Edit</button>
          <button class="btn-danger" onclick="deleteCategory(${category.id})">Delete</button>
        `;
        categoryList.appendChild(li);
      });
    }

    async function editCategory(id, oldName) {
      const token = localStorage.getItem('token');
      const newName = prompt('Enter new category name:', oldName);

      if (newName === null) return;

      const response = await fetch(`/api/categories/${id}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ name: newName })
      });

      const data = await response.json();
      showMessage(data.message || data.error, data.error ? 'error' : 'success');
      loadCategories();
    }

    async function deleteCategory(id) {
      const token = localStorage.getItem('token');

      if (!confirm('Are you sure you want to delete this category?')) return;

      const response = await fetch(`/api/categories/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      const data = await response.json();
      showMessage(data.message || data.error, data.error ? 'error' : 'success');
      loadCategories();
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const token = localStorage.getItem('token');
      const name = document.getElementById('categoryName').value;

      try {
        const response = await fetch('/api/categories', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ name })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('Category added successfully.', 'success');
          form.reset();
          loadCategories();
        } else {
          showMessage(data.error || 'Failed to add category.', 'error');
        }
      } catch (error) {
        showMessage('Something went wrong.', 'error');
      }
    });

    loadCategories();
  </script>
</body>
</html>

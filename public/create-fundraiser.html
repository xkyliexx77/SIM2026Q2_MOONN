<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Fundraiser</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Create Fundraiser</h2>
      <p id="flashMessage" class="flash"></p>

      <form id="fundraiserForm">
        <label>Title:</label>
        <input type="text" id="title" required>

        <label>Description:</label>
        <textarea id="description" required></textarea>

        <label>Target Amount:</label>
        <input type="number" id="target_amount" required>

        <label>Category:</label>
        <select id="category_id" required></select>

        <button type="submit" class="btn-primary">Create Fundraiser</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('fundraiserForm');
    const categorySelect = document.getElementById('category_id');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('flashMessage');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function loadCategories() {
      const response = await fetch('/api/categories');
      const categories = await response.json();

      categorySelect.innerHTML = '<option value="">Select Category</option>';

      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category.id;
        option.textContent = category.name;
        categorySelect.appendChild(option);
      });
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const token = localStorage.getItem('token');

      const fundraiserData = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        target_amount: document.getElementById('target_amount').value,
        category_id: document.getElementById('category_id').value
      };

      try {
        const response = await fetch('/api/fundraisers', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(fundraiserData)
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('Fundraiser created successfully.', 'success');
          form.reset();
        } else {
          showMessage(data.error || 'Failed to create fundraiser.', 'error');
        }
      } catch (error) {
        showMessage('Something went wrong.', 'error');
      }
    });

    loadCategories();
  </script>
</body>
</html>

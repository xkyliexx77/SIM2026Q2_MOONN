<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Fundraiser</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="create-fundraiser-body">
  <div class="create-fundraiser-container">

    <div class="create-fundraiser-header">
      <div>
        <h1>Create Fundraiser</h1>
        <p>Start a new fundraising campaign and assign it to a category.</p>
      </div>

      <a href="dashboard.html" class="create-fundraiser-back-btn">Back to Dashboard</a>
    </div>

    <div class="create-fundraiser-card">
      <h2>Fundraiser Details</h2>
      <p class="create-fundraiser-subtext">Fill in the details below to create a new fundraiser.</p>

      <p id="create-fundraiser-flash" class="flash"></p>

      <form id="create-fundraiser-form">
        <label>Title</label>
        <input type="text" id="create-fundraiser-title" placeholder="Enter fundraiser title" required>

        <label>Description</label>
        <textarea id="create-fundraiser-description" placeholder="Enter fundraiser description" required></textarea>

        <label>Target Amount</label>
        <input type="number" id="create-fundraiser-target-amount" placeholder="Enter target amount" required>

        <label>Category</label>
        <select id="create-fundraiser-category-id" required></select>

        <button type="submit" class="create-fundraiser-submit-btn">Create Fundraiser</button>
      </form>
    </div>

  </div>

  <script>
    const form = document.getElementById('create-fundraiser-form');
    const categorySelect = document.getElementById('create-fundraiser-category-id');

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('create-fundraiser-flash');
      msg.textContent = text;
      msg.className = `flash ${type}`;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function loadCategories() {
      const response = await fetch('/api/categories');
      const categories = await response.json();

      categorySelect.innerHTML = '<option value="">Select Category</option>';

      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category.id;
        option.textContent = category.name;
        categorySelect.appendChild(option);
      });
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const fundraiserData = {
        title: document.getElementById('create-fundraiser-title').value.trim(),
        description: document.getElementById('create-fundraiser-description').value.trim(),
        target_amount: document.getElementById('create-fundraiser-target-amount').value,
        category_id: document.getElementById('create-fundraiser-category-id').value
      };

      try {
        const response = await fetch('/api/fundraisers', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(fundraiserData)
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('Fundraiser created successfully.', 'success');
          form.reset();
          await loadCategories();
        } else {
          showMessage(data.error || 'Failed to create fundraiser.', 'error');
        }
      } catch (error) {
        showMessage('Something went wrong. Please try again.', 'error');
      }
    });

    loadCategories();
  </script>
</body>
</html>
